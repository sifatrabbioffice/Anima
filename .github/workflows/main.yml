name: Ultimate Auto iOS Landscape Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  generate-and-build:
    runs-on: macos-latest

    steps:
    # ১. গিটহাব থেকে আপনার আপলোড করা সব মিডিয়া ফাইল রানারে নিয়ে আসা
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ২. এক্সকোড প্রজেক্ট তৈরি করার জন্য XcodeGen টুল ইনস্টল করা
    - name: Install XcodeGen
      run: brew install xcodegen

    # ৩. ক্লাউডে ফোল্ডার তৈরি করে মাল্টি-ভিডিও এবং এআই গেম ইঞ্জিন কোড রাইট করা
    - name: Create App Source Files
      run: |
        mkdir -p GameApp
        
        # (ক) অ্যাপের মেইন এন্ট্রি পয়েন্ট ফাইল তৈরি
        cat << 'EOF' > GameApp/GameAppApp.swift
        import SwiftUI

        @main
        struct GameAppApp: App {
            var body: some Scene {
                WindowGroup {
                    ContentView()
                }
            }
        }
        EOF

        # (খ) সাউন্ড এবং হ্যাপটিক্স (ভাইব্রেশন) ম্যানেজমেন্ট সিস্টেম
        cat << 'EOF' > GameApp/SoundManager.swift
        import AVFoundation
        import UIKit

        class SoundManager {
            static let instance = SoundManager()
            var audioPlayer: AVAudioPlayer?

            // ১. কাস্টম MP3 সাউন্ড প্লে করার ফাংশন
            func playClickSound() {
                guard let path = Bundle.main.path(forResource: "click", ofType: "mp3") else { return }
                let url = URL(fileURLWithPath: path)
                do {
                    audioPlayer = try AVAudioPlayer(contentsOf: url)
                    audioPlayer?.prepareToPlay()
                    audioPlayer?.play()
                } catch {
                    print("Sound error: \(error.localizedDescription)")
                }
            }
            
            // ২. রিয়েল হ্যাপটিক ফিডব্যাক (তীব্রতা অনুযায়ী ফোনের ভাইব্রেশন)
            func triggerHaptic(intensity: Double) {
                guard intensity > 0 else { return }
                let generator = UIImpactFeedbackGenerator(style: intensity > 0.6 ? .heavy : (intensity > 0.3 ? .medium : .light))
                generator.prepare()
                generator.impactOccurred()
            }
        }
        EOF

        # (গ) রিইউজেবল ভিডিও প্লেয়ার (যেকোনো ভিডিও নাম দিলে সেটি লুপে চালাবে এবং বন্ধ করবে)
        cat << 'EOF' > GameApp/LoopingVideoPlayer.swift
        import SwiftUI
        import AVFoundation

        struct LoopingVideoPlayer: UIViewRepresentable {
            @Binding var shouldPlay: Bool
            let videoName: String
            
            class Coordinator: NSObject {
                var player: AVPlayer?
            }
            
            func makeCoordinator() -> Coordinator { Coordinator() }

            func makeUIView(context: Context) -> UIView {
                guard let path = Bundle.main.path(forResource: videoName, ofType: "mp4") else {
                    return UIView()
                }
                
                let url = URL(fileURLWithPath: path)
                let player = AVPlayer(url: url)
                context.coordinator.player = player
                
                let view = VideoPlayerUIView(player: player)
                
                NotificationCenter.default.addObserver(forName: .AVPlayerItemDidPlayToEndTime, object: player.currentItem, queue: .main) { _ in
                    if shouldPlay {
                        player.seek(to: .zero)
                        player.play()
                    }
                }
                
                if shouldPlay { player.play() }
                return view
            }
            
            func updateUIView(_ uiView: UIView, context: Context) {
                if shouldPlay {
                    context.coordinator.player?.play()
                } else {
                    context.coordinator.player?.pause()
                }
            }
        }

        class VideoPlayerUIView: UIView {
            private var playerLayer: AVPlayerLayer?
            init(player: AVPlayer) {
                super.init(frame: .zero)
                let playerLayer = AVPlayerLayer(player: player)
                playerLayer.videoGravity = .resizeAspectFill
                self.layer.addSublayer(playerLayer)
                self.playerLayer = playerLayer
            }
            required init?(coder: NSCoder) { fatalError() }
            override func layoutSubviews() {
                super.layoutSubviews()
                playerLayer?.frame = self.bounds
            }
        }
        EOF

        # (ঘ) মূল ইউআই লেআউট এবং স্ক্রিন ট্রানজিশন কন্ট্রোলার (ContentView)
        cat << 'EOF' > GameApp/ContentView.swift
        import SwiftUI

        struct ContentView: View {
            @State private var isGameZoneActive = false
            @State private var isGlowing = false
            
            var body: some View {
                ZStack {
                    if !isGameZoneActive {
                        // --- স্ক্রিন ১: হোম স্ক্রিন (ভিডিও ১ + ব্লিংকিং টেক্সট) ---
                        ZStack {
                            LoopingVideoPlayer(shouldPlay: .init(get: { !isGameZoneActive }, set: { _ in }), videoName: "background")
                                .ignoresSafeArea()
                            
                            VStack {
                                Spacer()
                                Text("TAP TO SCREEN")
                                    .font(.system(size: 16, weight: .bold, design: .monospaced))
                                    .foregroundColor(.white)
                                    .tracking(4)
                                    .opacity(isGlowing ? 1.0 : 0.15)
                                    .shadow(color: .white.opacity(0.8), radius: isGlowing ? 12 : 1)
                                    .onAppear {
                                        withAnimation(.easeInOut(duration: 1.8).repeatForever(autoreverses: true)) {
                                            isGlowing = true
                                        }
                                    }
                                    .onTapGesture {
                                        SoundManager.instance.playClickSound()
                                        withAnimation(.easeInOut(duration: 0.4)) {
                                            isGameZoneActive = true
                                        }
                                    }
                            }
                            .padding(.bottom, 35)
                        }
                    } else {
                        // --- স্ক্রিন ২: মেইন গেম জোন হাবে চলে যাওয়া ---
                        GameZoneView(isGameZoneActive: $isGameZoneActive)
                    }
                }
            }
        }
        EOF

        # (ঙ) এআই ইন্টেলিজেন্স গেম হাব এবং সেটিংস ইউআই (GameZoneView)
        cat << 'EOF' > GameApp/GameZoneView.swift
        import SwiftUI

        struct GameZoneView: View {
            @Binding var isGameZoneActive: Bool
            @State private var isActualGameActive = false
            
            // গেম অপশন ও সেটিংসের জন্য স্টেট ভেরিয়েবল
            @State private var graphicsQuality = "Ultra"
            @State private var controllerType = "Joystick"
            @State private var soundVolume = 0.8
            @State private var hapticIntensity = 0.5
            
            let graphicsOptions = ["Low", "Medium", "High", "Ultra"]
            let controllerOptions = ["Joystick", "D-Pad", "Tilt"]

            var body: some View {
                ZStack {
                    // ২য় ভিডিও ব্যাকগ্রাউন্ড (গেম হাবের জন্য আলাদা)
                    LoopingVideoPlayer(shouldPlay: .init(get: { !isActualGameActive && isGameZoneActive }, set: { _ in }), videoName: "game_background")
                        .ignoresSafeArea()
                    
                    if !isActualGameActive {
                        // --- স্ক্রিন ২ এর মেইন মেনু ইউআই ---
                        ZStack {
                            // বাম পাশে অপশন বাটনসমূহ (টপ লেফট এলাইনমেন্ট)
                            VStack(alignment: .leading, spacing: 15) {
                                Button(action: {
                                    SoundManager.instance.playClickSound()
                                    SoundManager.instance.triggerHaptic(intensity: hapticIntensity)
                                    withAnimation(.spring()) { isActualGameActive = true }
                                }) {
                                    Text("START THE GAME")
                                        .font(.system(size: 18, weight: .black, design: .monospaced))
                                        .foregroundColor(.green)
                                        .padding(.vertical, 10)
                                        .padding(.horizontal, 20)
                                        .background(Color.black.opacity(0.6))
                                        .cornerRadius(8)
                                        .overlay(RoundedRectangle(cornerRadius: 8).stroke(Color.green, lineWidth: 1))
                                }
                                
                                Button(action: {
                                    SoundManager.instance.playClickSound()
                                    withAnimation(.easeInOut(duration: 0.4)) {
                                        isGameZoneActive = false // প্রথম পেজে ব্যাক করা
                                    }
                                }) {
                                    Text("EXIT GAME")
                                        .font(.system(size: 16, weight: .bold, design: .monospaced))
                                        .foregroundColor(.red)
                                        .padding(.vertical, 8)
                                        .padding(.horizontal, 15)
                                        .background(Color.black.opacity(0.6))
                                        .cornerRadius(8)
                                        .overlay(RoundedRectangle(cornerRadius: 8).stroke(Color.red, lineWidth: 1))
                                }
                                Spacer()
                            }
                            .padding(.top, 30)
                            .padding(.leading, 30)
                            
                            // ডান পাশে একটি কন্টেন্ট বক্স (গেমিং ভাইব বাড়ানোর জন্য)
                            VStack {
                                Spacer()
                                Text("NEON ARCADE HUB v2.0")
                                    .font(.system(size: 12, weight: .regular, design: .monospaced))
                                    .foregroundColor(.white.opacity(0.4))
                            }
                            .padding(.bottom, 20)
                        }
                    } else {
                        // --- স্ক্রিন ৩: এআই জেনারেটেড ইন্টারেক্টিভ গেম এবং এডভান্সড সেটিংস ---
                        ActualGameArenaView(
                            isActualGameActive: $isActualGameActive,
                            graphicsQuality: $graphicsQuality,
                            controllerType: $controllerType,
                            soundVolume: $soundVolume,
                            hapticIntensity: $hapticIntensity,
                            graphicsOptions: graphicsOptions,
                            controllerOptions: controllerOptions
                        )
                    }
                }
            }
        }

        // এআই ইন্টেলিজেন্স দ্বারা তৈরি মূল গেম এরিয়া এবং সেটিংস কন্ট্রোল প্যানেল
        struct ActualGameArenaView: View {
            @Binding var isActualGameActive: Bool
            @Binding var graphicsQuality: String
            @Binding var controllerType: String
            @Binding var soundVolume: Double
            @Binding var hapticIntensity: Double
            
            let graphicsOptions: [String]
            let controllerOptions: [String]
            
            @State private var score = 0
            @State private var playerPosition: CGFloat = 0.0
            
            var body: some View {
                HStack(spacing: 0) {
                    // [বাম অংশ]: এডভান্সড গেমিং সেটিংস প্যানেল (HUD Style)
                    ScrollView {
                        VStack(alignment: .leading, spacing: 18) {
                            Text("SYSTEM SETTINGS")
                                .font(.system(size: 18, weight: .black, design: .monospaced))
                                .foregroundColor(.cyan)
                            
                            // ১. গ্রাফিক্স সেটিং
                            VStack(alignment: .leading, spacing: 5) {
                                Text("GRAPHICS QUALITY: \(graphicsQuality)")
                                    .font(.system(size: 11, weight: .bold, design: .monospaced))
                                    .foregroundColor(.white)
                                Picker("Graphics", selection: $graphicsQuality) {
                                    ForEach(graphicsOptions, id: \.self) { Text($0) }
                                }
                                .pickerStyle(SegmentedPickerStyle())
                            }
                            
                            // ২. কন্ট্রোলার টাইপ
                            VStack(alignment: .leading, spacing: 5) {
                                Text("CONTROLLER SYSTEM: \(controllerType)")
                                    .font(.system(size: 11, weight: .bold, design: .monospaced))
                                    .foregroundColor(.white)
                                Picker("Controller", selection: $controllerType) {
                                    ForEach(controllerOptions, id: \.self) { Text($0) }
                                }
                                .pickerStyle(SegmentedPickerStyle())
                            }
                            
                            // ৩. সাউন্ড ভলিউম স্লাইডার
                            VStack(alignment: .leading, spacing: 5) {
                                Text("AUDIO VOLUME: \(Int(soundVolume * 100))%")
                                    .font(.system(size: 11, weight: .bold, design: .monospaced))
                                    .foregroundColor(.white)
                                Slider(value: $soundVolume, in: 0...1)
                                    .accentColor(.cyan)
                            }
                            
                            // ৪. বাটন হ্যাপটিক্স স্লাইডার
                            VStack(alignment: .leading, spacing: 5) {
                                Text("BUTTON HAPTIC FEEDBACK: \(Int(hapticIntensity * 100))%")
                                    .font(.system(size: 11, weight: .bold, design: .monospaced))
                                    .foregroundColor(.white)
                                Slider(value: $hapticIntensity, in: 0...1, onEditingChanged: { _ in
                                    SoundManager.instance.triggerHaptic(intensity: hapticIntensity)
                                })
                                .accentColor(.purple)
                            }
                            
                            // মেইন হাবে ফিরে যাওয়ার বাটন
                            Button(action: {
                                SoundManager.instance.playClickSound()
                                withAnimation(.spring()) { isActualGameActive = false }
                            }) {
                                Text("BACK TO HUB")
                                    .font(.system(size: 13, weight: .bold, design: .monospaced))
                                    .foregroundColor(.orange)
                                    .padding(.vertical, 8)
                                    .frame(maxWidth: .infinity)
                                    .background(Color.orange.opacity(0.1))
                                    .cornerRadius(6)
                                    .overlay(RoundedRectangle(cornerRadius: 6).stroke(Color.orange, lineWidth: 1))
                            }
                        }
                        .padding(20)
                    }
                    .frame(width: 320)
                    .background(Color.black.opacity(0.85))
                    .overlay(Rectangle().frame(width: 1).foregroundColor(.cyan.opacity(0.3)), alignment: .trailing)
                    
                    // [ডান অংশ]: লাইভ ইন্টারেক্টিভ স্পেস শুটিং মিনি গেম এরিয়া
                    ZStack {
                        Color.black.opacity(0.9).ignoresSafeArea()
                        
                        VStack {
                            HStack {
                                Text("SCORE: \(score)")
                                    .font(.system(size: 20, weight: .black, design: .monospaced))
                                    .foregroundColor(.green)
                                Spacer()
                                Text("MODE: \(graphicsQuality.uppercased())")
                                    .font(.system(size: 12, weight: .bold, design: .monospaced))
                                    .foregroundColor(.gray)
                            }
                            .padding()
                            
                            Spacer()
                            
                            // ইন্টারেক্টিভ এআই এনিমি টার্গেট অবজেক্ট
                            Circle()
                                .fill(LinearGradient(colors: [.red, .orange], startPoint: .top, endPoint: .bottom))
                                .frame(width: 50, height: 50)
                                .offset(x: playerPosition, y: -20)
                                .shadow(color: .red, radius: 10)
                                .animation(.easeInOut(duration: 0.6), value: playerPosition)
                            
                            Spacer()
                            
                            // কাস্টম কন্ট্রোলার বাটন এরিয়া (যা হ্যাপটিক্স টেস্ট করতে সাহায্য করবে)
                            HStack(spacing: 40) {
                                Button(action: {
                                    SoundManager.instance.triggerHaptic(intensity: hapticIntensity)
                                    if playerPosition > -100 { playerPosition -= 40 }
                                }) {
                                    Image(systemName: "arrow.left.square.fill").font(.system(size: 40)).foregroundColor(.cyan)
                                }
                                
                                Button(action: {
                                    SoundManager.instance.triggerHaptic(intensity: hapticIntensity)
                                    score += 10
                                    SoundManager.instance.playClickSound()
                                }) {
                                    Text("FIRE")
                                        .font(.system(size: 16, weight: .black, design: .monospaced))
                                        .foregroundColor(.white)
                                        .padding(.horizontal, 30)
                                        .padding(.vertical, 12)
                                        .background(Color.red)
                                        .cornerRadius(10)
                                        .shadow(color: .red.opacity(0.5), radius: 8)
                                }
                                
                                Button(action: {
                                    SoundManager.instance.triggerHaptic(intensity: hapticIntensity)
                                    if playerPosition < 100 { playerPosition += 40 }
                                }) {
                                    Image(systemName: "arrow.right.square.fill").font(.system(size: 40)).foregroundColor(.cyan)
                                }
                            }
                            .padding(.bottom, 20)
                        }
                    }
                }
            }
        }
        EOF

        # (ছ) ল্যান্ডস্কেপ লকড Info.plist তৈরি
        cat << 'EOF' > GameApp/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleIdentifier</key>
            <string>com.automation.GameApp</string>
            <key>CFBundleExecutable</key>
            <string>GameApp</string>
            <key>CFBundleName</key>
            <string>GameApp</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>UILaunchScreen</key>
            <dict/>
            <key>UISupportedInterfaceOrientations</key>
            <array>
                <string>UIInterfaceOrientationLandscapeLeft</string>
                <string>UIInterfaceOrientationLandscapeRight</string>
            </array>
            <key>UISupportedInterfaceOrientations~ipad</key>
            <array>
                <string>UIInterfaceOrientationLandscapeLeft</string>
                <string>UIInterfaceOrientationLandscapeRight</string>
            </array>
        </dict>
        </plist>
        EOF

    # ৪. আপনার আপলোড করা ভিডিও এবং সাউন্ড ফাইলগুলো সঠিক উপায়ে ভেরিফাই এবং অ্যাপ ফোল্ডারে কপি করা
    - name: Move All Assets to App Folder
      run: |
        if [ -f "background.mp4" ] && [ -f "game_background.mp4" ] && [ -f "click.mp3" ]; then
          cp background.mp4 GameApp/
          cp game_background.mp4 GameApp/
          cp click.mp3 GameApp/
          echo "সবগুলো মিডিয়া এবং অডিও এসেট সফলভাবে লোড হয়েছে।"
        else
          echo "ERROR: background.mp4, game_background.mp4 অথবা click.mp3 ফাইল মিসিং আছে!"
          exit 1
        fi

    # ৫. XcodeGen এর জন্য কনফিগারেশন (project.yml) তৈরি করা
    - name: Create XcodeGen Specification
      run: |
        cat << 'EOF' > project.yml
        name: GameApp
        options:
          bundleIdPrefix: com.automation
        targets:
          GameApp:
            type: application
            platform: iOS
            deploymentTarget: "15.0"
            sources: [GameApp]
            info:
              path: GameApp/Info.plist
        EOF

    # ⑥. রানারের ভেতরে স্বয়ংক্রিয়ভাবে .xcodeproj ফাইল জেনারেট করা
    - name: Generate Xcode Project File
      run: xcodegen generate

    # ৭. অ্যাপল সার্টিফিকেট ছাড়া ল্যান্ডস্কেপ অ্যাপটি কম্পাইল করা (Unsigned Build)
    - name: Compile iOS App (No-Sign)
      run: |
        xcodebuild clean build \
          -project "GameApp.xcodeproj" \
          -scheme "GameApp" \
          -sdk iphoneos \
          -configuration Release \
          -derivedDataPath build_output \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_PROFILE_SPECIFIER="" \
          COMPILER_INDEX_STORE_ENABLE=NO

    # ৮. বিল্ড হওয়া ফাইলকে অফিসিয়াল Unsigned .ipa ফরম্যাটে প্যাকেজ করা
    - name: Package App into Unsigned IPA
      run: |
        mkdir -p Payload
        cp -r build_output/Build/Products/Release-iphoneos/GameApp.app Payload/
        zip -r GameApp.ipa Payload

    # ৯. তৈরি হওয়া ফাইনাল ল্যান্ডস্কেপ .ipa ফাইলটি গিটহাবে আপলোড করা
    - name: Upload Final IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GameZone-AI-Edition-App
        path: GameApp.ipa
