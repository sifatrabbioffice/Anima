name: Ultimate Auto iOS Landscape Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  generate-and-build:
    runs-on: macos-latest

    steps:
    # ১. গিটহাব থেকে আপনার আপলোড করা সব মিডিয়া ফাইল রানারে নিয়ে আসা
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ২. এক্সকোড প্রজেক্ট তৈরি করার জন্য XcodeGen টুল ইনস্টল করা
    - name: Install XcodeGen
      run: brew install xcodegen

    # ৩. ক্লাউডে ফোল্ডার তৈরি করে ৩টি আলাদা পেজের সম্পূর্ণ সোর্স কোড রাইট করা
    - name: Create App Source Files
      run: |
        mkdir -p GameApp
        
        # (ক) অ্যাপের মেইন এন্ট্রি পয়েন্ট ফাইল তৈরি
        cat << 'EOF' > GameApp/GameAppApp.swift
        import SwiftUI

        @main
        struct GameAppApp: App {
            var body: some Scene {
                WindowGroup {
                    ContentView()
                }
            }
        }
        EOF

        # (খ) সাউন্ড এবং হ্যাপটিক্স (ভাইব্রেশন) কন্ট্রোল ইঞ্জিন
        cat << 'EOF' > GameApp/SoundManager.swift
        import AVFoundation
        import UIKit

        class SoundManager {
            static let instance = SoundManager()
            var audioPlayer: AVAudioPlayer?

            func playClickSound() {
                guard let path = Bundle.main.path(forResource: "click", ofType: "mp3") else { return }
                let url = URL(fileURLWithPath: path)
                do {
                    audioPlayer = try AVAudioPlayer(contentsOf: url)
                    audioPlayer?.prepareToPlay()
                    audioPlayer?.play()
                } catch {
                    print("Sound error: \(error.localizedDescription)")
                }
            }
            
            func triggerHaptic(intensity: Double) {
                guard intensity > 0 else { return }
                let generator = UIImpactFeedbackGenerator(style: intensity > 0.6 ? .heavy : (intensity > 0.3 ? .medium : .light))
                generator.prepare()
                generator.impactOccurred()
            }
        }
        EOF

        # (গ) লুপে ভিডিও চালানোর ব্যাকগ্রাউন্ড রেন্ডারার
        cat << 'EOF' > GameApp/LoopingVideoPlayer.swift
        import SwiftUI
        import AVFoundation

        struct LoopingVideoPlayer: UIViewRepresentable {
            @Binding var shouldPlay: Bool
            let videoName: String
            
            class Coordinator: NSObject { var player: AVPlayer? }
            func makeCoordinator() -> Coordinator { Coordinator() }

            func makeUIView(context: Context) -> UIView {
                guard let path = Bundle.main.path(forResource: videoName, ofType: "mp4") else { return UIView() }
                let url = URL(fileURLWithPath: path)
                let player = AVPlayer(url: url)
                context.coordinator.player = player
                let view = VideoPlayerUIView(player: player)
                
                NotificationCenter.default.addObserver(forName: .AVPlayerItemDidPlayToEndTime, object: player.currentItem, queue: .main) { _ in
                    if shouldPlay { player.seek(to: .zero); player.play() }
                }
                if shouldPlay { player.play() }
                return view
            }
            
            func updateUIView(_ uiView: UIView, context: Context) {
                if shouldPlay { context.coordinator.player?.play() } else { context.coordinator.player?.pause() }
            }
        }

        class VideoPlayerUIView: UIView {
            private var playerLayer: AVPlayerLayer?
            init(player: AVPlayer) {
                super.init(frame: .zero)
                let playerLayer = AVPlayerLayer(player: player)
                playerLayer.videoGravity = .resizeAspectFill
                self.layer.addSublayer(playerLayer)
                self.playerLayer = playerLayer
            }
            required init?(coder: NSCoder) { fatalError() }
            override func layoutSubviews() { super.layoutSubviews() ; playerLayer?.frame = self.bounds }
        }
        EOF

        # (ঘ) মূল ৩টি পেজের ইউনিফাইড কোডবেস (ContentView.swift)
        cat << 'EOF' > GameApp/ContentView.swift
        import SwiftUI

        // ৩টি পেজ ট্র্যাক করার জন্য স্টেট মেশিন
        enum GameStateScreen { case page1Home, page2HubMenu, page3EpicGame }

        struct ContentView: View {
            @State private var currentScreen: GameStateScreen = .page1Home
            @State private var isGlowing = false
            @State private var showOptionsOverlay = false
            
            // শেয়ার্ড কনফিগারেশন সেটিংস (যা অপশন পিকার ও স্লাইডার থেকে কন্ট্রোল হবে)
            @State private var graphicsQuality = "Ultra"
            @State private var controllerType = "Joystick"
            @State private var soundVolume: Double = 0.8
            @State private var hapticIntensity: Double = 0.6
            
            var body: some View {
                ZStack {
                    switch currentScreen {
                    
                    // ==================== [পেজ ১: হোম স্ক্রিন] ====================
                    case .page1Home:
                        ZStack {
                            LoopingVideoPlayer(shouldPlay: .init(get: { currentScreen == .page1Home }, set: { _ in }), videoName: "background")
                                .ignoresSafeArea()
                            
                            VStack {
                                Spacer()
                                Text("TAP TO SCREEN")
                                    .font(.system(size: 16, weight: .bold, design: .monospaced))
                                    .foregroundColor(.white)
                                    .tracking(5)
                                    .opacity(isGlowing ? 1.0 : 0.15)
                                    .shadow(color: .white.opacity(0.8), radius: isGlowing ? 12 : 1)
                                    .onAppear {
                                        withAnimation(.easeInOut(duration: 1.8).repeatForever(autoreverses: true)) {
                                            isGlowing = true
                                        }
                                    }
                                    .onTapGesture {
                                        SoundManager.instance.playClickSound()
                                        withAnimation(.easeInOut(duration: 0.4)) { currentScreen = .page2HubMenu }
                                    }
                            }
                            .padding(.bottom, 35)
                        }
                        
                    // ==================== [পেজ ২: ৩টি বাটন ও ক্লিন মেনু হাব] ====================
                    case .page2HubMenu:
                        ZStack {
                            LoopingVideoPlayer(shouldPlay: .init(get: { currentScreen == .page2HubMenu }, set: { _ in }), videoName: "game_background")
                                .ignoresSafeArea()
                            
                            // সুনির্দিষ্ট ৩টি বাটন: স্টার্ট (উপরে), অপশন (মাঝে), এক্সিট (নিচে)
                            VStack(spacing: 25) {
                                Text("NEON OVERLORD HUB")
                                    .font(.system(size: 32, weight: .black, design: .monospaced))
                                    .foregroundColor(.white)
                                    .shadow(color: .cyan, radius: 10)
                                    .padding(.bottom, 20)
                                
                                // ১. স্টার্ট গেম বাটন (উপরে) -> ৩ নম্বর পেজে নিয়ে যাবে
                                Button(action: {
                                    SoundManager.instance.playClickSound()
                                    SoundManager.instance.triggerHaptic(intensity: hapticIntensity)
                                    withAnimation(.spring()) { currentScreen = .page3EpicGame }
                                }) {
                                    MenuButtonDesign(text: "START GAME", color: .green)
                                }
                                
                                // ২. অপশন বাটন (মাঝে) -> অডিও/হ্যাপটিক্স কমানো বাড়ানোর প্যানেল খুলবে
                                Button(action: {
                                    SoundManager.instance.playClickSound()
                                    SoundManager.instance.triggerHaptic(intensity: hapticIntensity)
                                    withAnimation(.easeInOut(duration: 0.3)) { showOptionsOverlay = true }
                                }) {
                                    MenuButtonDesign(text: "OPTIONS", color: .cyan)
                                }
                                
                                // ৩. এক্সিট গেম বাটন (নিচে) -> প্রথম পেজে ফিরিয়ে নিয়ে যাবে
                                Button(action: {
                                    SoundManager.instance.playClickSound()
                                    withAnimation(.easeInOut(duration: 0.4)) { currentScreen = .page1Home }
                                }) {
                                    MenuButtonDesign(text: "EXIT GAME", color: .red)
                                }
                            }
                            .padding()
                            
                            // অপশন বাটনে চাপ দিলে যে পপআপ প্যানেলটি আসবে
                            if showOptionsOverlay {
                                Color.black.opacity(0.8)
                                    .ignoresSafeArea()
                                    .onTapGesture { withAnimation { showOptionsOverlay = false } }
                                
                                VStack(spacing: 20) {
                                    HStack {
                                        Text("SYSTEM OPTIONS")
                                            .font(.system(size: 20, weight: .black, design: .monospaced))
                                            .foregroundColor(.cyan)
                                        Spacer()
                                        Button(action: { withAnimation { showOptionsOverlay = false } }) {
                                            Image(systemName: "xmark.circle.fill").font(.title2).foregroundColor(.white)
                                        }
                                    }
                                    
                                    Divider().background(Color.white.opacity(0.3))
                                    
                                    // সাউন্ড কমানো বাড়ানো
                                    VStack(alignment: .leading, spacing: 5) {
                                        Text("AUDIO VOLUME: \(Int(soundVolume * 100))%").font(.caption).foregroundColor(.gray)
                                        Slider(value: $soundVolume, in: 0...1).accentColor(.cyan)
                                    }
                                    
                                    // বাটন হ্যাপটিক্স কমানো বাড়ানো
                                    VStack(alignment: .leading, spacing: 5) {
                                        Text("BUTTON HAPTIC FEEDBACK: \(Int(hapticIntensity * 100))%").font(.caption).foregroundColor(.gray)
                                        Slider(value: $hapticIntensity, in: 0...1, onEditingChanged: { _ in
                                            SoundManager.instance.triggerHaptic(intensity: hapticIntensity)
                                        }).accentColor(.purple)
                                    }
                                    
                                    // গ্রাফিক্স সেটিংস সিস্টেম
                                    HStack {
                                        Text("GRAPHICS:").font(.caption).foregroundColor(.gray)
                                        Picker("Graphics", selection: $graphicsQuality) {
                                            ForEach(["Low", "Medium", "High", "Ultra"], id: \.self) { Text($0) }
                                        }.pickerStyle(SegmentedPickerStyle())
                                    }
                                    
                                    // কন্ট্রোলার সেটিংস সিস্টেম
                                    HStack {
                                        Text("CONTROLLER:").font(.caption).foregroundColor(.gray)
                                        Picker("Controls", selection: $controllerType) {
                                            ForEach(["Joystick", "D-Pad", "Touch-Aim"], id: \.self) { Text($0) }
                                        }.pickerStyle(SegmentedPickerStyle())
                                    }
                                }
                                .padding(25)
                                .frame(width: 460)
                                .background(Color(white: 0.07))
                                .cornerRadius(16)
                                .overlay(RoundedRectangle(cornerRadius: 16).stroke(Color.cyan.opacity(0.5), lineWidth: 1.5))
                                .shadow(color: .cyan.opacity(0.3), radius: 20)
                                .transition(.scale.combined(with: .opacity))
                            }
                        }
                        
                    // ==================== [পেজ ৩: আলতিমেট হাই-গ্রাফিক্স অ্যাকশন-অ্যাডভেঞ্চার আরপিজি গেম] ====================
                    case .page3EpicGame:
                        TripleAActionStoryGameView(
                            currentScreen: $currentScreen,
                            graphicsQuality: graphicsQuality,
                            controllerType: controllerType,
                            soundVolume: soundVolume,
                            hapticIntensity: hapticIntensity
                        )
                    }
                }
            }
        }

        // বাটন ডিজাইন স্ট্রাকচার
        struct MenuButtonDesign: View {
            let text: String
            let color: Color
            var body: some View {
                Text(text)
                    .font(.system(size: 16, weight: .black, design: .monospaced))
                    .foregroundColor(color)
                    .frame(width: 220)
                    .padding(.vertical, 12)
                    .background(Color.black.opacity(0.6))
                    .cornerRadius(10)
                    .overlay(RoundedRectangle(cornerRadius: 10).stroke(color.opacity(0.8), lineWidth: 1.5))
                    .shadow(color: color.opacity(0.2), radius: 5)
            }
        }
        EOF

        # (ঙ) থার্ড পেজের জন্য সিনেমাটিক স্টোরি ও অ্যাকশন অ্যাডভেঞ্চার আরপিজি ইঞ্জিন কোড
        cat << 'EOF' > GameApp/TripleAActionStoryGameView.swift
        import SwiftUI

        struct TripleAActionStoryGameView: View {
            @Binding var currentScreen: GameStateScreen
            
            let graphicsQuality: String
            let controllerType: String
            let soundVolume: Double
            let hapticIntensity: Double
            
            // আরপিজি গেমের কোর ডাটা ও ডাইনামিক স্টোরি সিস্টেম
            @State private var playerHP: CGFloat = 100.0
            @State private var bossHP: CGFloat = 200.0
            @State private var storyLog = "▶ CHAPTER 1: THE CYBER RISE.\nYou wake up in a neon-drenched facility. The Titan AI has compromised the city defenses. Your mission is to breach the main core."
            @State private var currentMission = "Objective: Neutralize the Sector-X Overlord Gatekeeper."
            @State private var weaponLevel = 1
            @State private var isAttacking = false
            @State private var gameEnded = false
            @State private var gameWon = false

            var body: some View {
                HStack(spacing: 0) {
                    
                    // [বাম অংশ]: সিনেমাটিক স্টোরি টেলিং ও ড্যাশবোর্ড প্যানেল
                    VStack(alignment: .leading, spacing: 14) {
                        HStack {
                            Text("⚡ STAGE 1: INFILTRATION")
                                .font(.system(size: 12, weight: .black, design: .monospaced))
                                .foregroundColor(.yellow)
                            Spacer()
                            Text("WEAPON v\(weaponLevel)").font(.caption).foregroundColor(.gray)
                        }
                        
                        Divider().background(Color.yellow.opacity(0.3))
                        
                        Text("CINEMATIC DIALOGUE & LOG")
                            .font(.system(size: 11, weight: .bold, design: .monospaced))
                            .foregroundColor(.orange)
                        
                        // ডাইনামিক রিয়েল-টাইম স্টোরি আপডেট বক্স
                        ScrollView {
                            Text(storyLog)
                                .font(.system(size: 11, weight: .medium, design: .default))
                                .foregroundColor(.white.opacity(0.9))
                                .padding(10)
                                .frame(maxWidth: .infinity, alignment: .topLeading)
                                .background(Color.white.opacity(0.03))
                                .cornerRadius(8)
                        }
                        
                        Text(currentMission)
                            .font(.system(size: 11, weight: .bold, design: .monospaced))
                            .foregroundColor(.cyan)
                            .padding(8)
                            .background(Color.cyan.opacity(0.1))
                            .cornerRadius(6)
                        
                        Spacer()
                        
                        // ব্যাক টু হাব মেনু বাটন
                        Button(action: {
                            SoundManager.instance.playClickSound()
                            withAnimation { currentScreen = .page2HubMenu }
                        }) {
                            Text("ABANDON MISSION")
                                .font(.system(size: 11, weight: .bold, design: .monospaced))
                                .foregroundColor(.red)
                                .frame(maxWidth: .infinity)
                                .padding(.vertical, 8)
                                .background(Color.red.opacity(0.1))
                                .cornerRadius(6)
                                .overlay(RoundedRectangle(cornerRadius: 6).stroke(Color.red.opacity(0.4), lineWidth: 1))
                        }
                    }
                    .padding(15)
                    .frame(width: 270)
                    .background(Color(white: 0.04))
                    .overlay(Rectangle().frame(width: 1).foregroundColor(.white.opacity(0.1)), alignment: .trailing)
                    
                    // [ডান অংশ]: হাই-গ্রাফিক্স সিনেমাটিক অ্যাকশন কম্ব্যাট এরিয়া
                    ZStack {
                        Color.black.ignoresSafeArea()
                        
                        // আল্ট্রা গ্রাফিক্স এর জন্য ডাইনামিক লাইটিং গ্লো ইফেক্ট
                        LinearGradient(colors: [.purple.opacity(graphicsQuality == "Ultra" ? 0.25 : 0.05), .black], startPoint: .top, endPoint: .bottom)
                            .ignoresSafeArea()
                        
                        VStack(spacing: 15) {
                            // বসের হেলথ বার (BOSS HUD)
                            VStack(alignment: .leading, spacing: 4) {
                                HStack {
                                    Text("🤖 CYBER TITAN OVERLORD")
                                        .font(.system(size: 12, weight: .black, design: .monospaced))
                                        .foregroundColor(.red)
                                    Spacer()
                                    Text("\(Int(bossHP)) / 200 HP").font(.caption).foregroundColor(.gray)
                                }
                                GeometryReader { geo in
                                    ZStack(alignment: .leading) {
                                        Capsule().fill(Color.red.opacity(0.2))
                                        Capsule().fill(LinearGradient(colors: [.red, .orange], startPoint: .leading, endPoint: .trailing))
                                            .frame(width: max(0, (bossHP / 200.0) * geo.size.width))
                                    }
                                }.frame(height: 10)
                            }
                            .padding(.horizontal, 15)
                            
                            Spacer()
                            
                            // ব্যাটল ফিল্ড রেন্ডারিং (প্লেয়ার বনাম বস অ্যানিমেশন)
                            HStack(spacing: 70) {
                                Text("👤") // প্লেয়ার ক্যারেক্টার
                                    .font(.system(size: 45))
                                    .offset(x: isAttacking ? 35 : 0)
                                    .shadow(color: .cyan, radius: isAttacking ? 15 : 2)
                                
                                Text("VS")
                                    .font(.system(size: 14, weight: .black, design: .monospaced))
                                    .foregroundColor(.white.opacity(0.2))
                                
                                Text("👹") // এনিমি বস
                                    .font(.system(size: 50))
                                    .scaleEffect(bossHP > 0 ? 1.0 : 0.1)
                                    .rotationEffect(.degrees(bossHP > 0 ? 0 : 90))
                                    .shadow(color: .red, radius: 12)
                            }
                            .animation(.spring(response: 0.25, dampingFraction: 0.4), value: isAttacking)
                            
                            Spacer()
                            
                            // প্লেয়ার হেলথ এবং পাওয়ারফুল অ্যাকশন কন্ট্রোল বাটন সমূহ
                            VStack(spacing: 12) {
                                VStack(alignment: .leading, spacing: 4) {
                                    HStack {
                                        Text("💖 MY ENERGY INTERFACE")
                                            .font(.system(size: 11, weight: .bold, design: .monospaced))
                                            .foregroundColor(.cyan)
                                        Spacer()
                                        Text("\(Int(playerHP))%").font(.caption).foregroundColor(.gray)
                                    }
                                    GeometryReader { geo in
                                        ZStack(alignment: .leading) {
                                            Capsule().fill(Color.cyan.opacity(0.2))
                                            Capsule().fill(Color.cyan)
                                                .frame(width: max(0, (playerHP / 100.0) * geo.size.width))
                                        }
                                    }.frame(height: 8)
                                }
                                .padding(.horizontal, 10)
                                
                                // ৩টি অ্যাডভেঞ্চার কন্ট্রোল অ্যাকশন বাটন
                                HStack(spacing: 15) {
                                    // ১. হেভি কম্ব্যাট ট্রিপল অ্যাটাক
                                    Button(action: { fireCombatStrike(name: "LASER SWORD STRIKE", damage: 35, recoil: 12) }) {
                                        GameActionPad(icon: "flame.fill", label: "SWORD ATTACK", sub: "-12 HP Cost", color: .orange)
                                    }
                                    
                                    // ২. প্রফেশনাল রেঞ্জড প্লাজমা গান ফায়ার
                                    Button(action: { fireCombatStrike(name: "PLASMA GUN BURST", damage: 20, recoil: 0) }) {
                                        GameActionPad(icon: "cross.case.fill", label: "PLASMA FIRE", sub: "Safe Range", color: .cyan)
                                    }
                                    
                                    // ৩. স্টোরি মেকানিজম ন্যানো রি-জেনারেটর
                                    Button(action: {
                                        SoundManager.instance.playClickSound()
                                        SoundManager.instance.triggerHaptic(intensity: hapticIntensity)
                                        if playerHP < 100 {
                                            playerHP = min(100, playerHP + 35)
                                            storyLog = "▶ You activated [NANO MEDICINE REGEN]. Recovered +35 HP.\n\n" + storyLog
                                        }
                                    }) {
                                        GameActionPad(icon: "bolt.heart.fill", label: "NANO HEAL", sub: "Heal +35 HP", color: .green)
                                    }
                                }
                            }
                            .padding(10)
                            .background(Color.white.opacity(0.03))
                            .cornerRadius(12)
                        }
                        .padding(.vertical, 15)
                        .padding(.horizontal, 15)
                        
                        // গেম ওভার অথবা ভিক্টোরি পপআপ উইন্ডো
                        if gameEnded {
                            Color.black.opacity(0.92).ignoresSafeArea()
                            VStack(spacing: 20) {
                                Text(gameWon ? "VICTORY ACHIEVED" : "MISSION FAILED: DEFEATED")
                                    .font(.system(size: 28, weight: .black, design: .monospaced))
                                    .foregroundColor(gameWon ? .green : .red)
                                    .shadow(color: gameWon ? .green : .red, radius: 10)
                                
                                Text(gameWon ? "The Titan Core is neutralized. You saved the futuristic cyber city!" : "Your energy field was breached. The Titan AI remains supreme.")
                                    .font(.subheadline)
                                    .foregroundColor(.gray)
                                    .multilineTextAlignment(.center)
                                
                                Button(action: { reloadGameArena() }) {
                                    Text("RESPAWN / TRY AGAIN")
                                        .font(.system(size: 14, weight: .bold, design: .monospaced))
                                        .foregroundColor(.white)
                                        .padding(.vertical, 10)
                                        .padding(.horizontal, 25)
                                        .background(gameWon ? Color.green : Color.red)
                                        .cornerRadius(8)
                                }
                            }
                        }
                    }
                }
            }
            
            // রিয়েল-টাইম কম্ব্যাট হ্যান্ডলিং ফাংশন
            private func fireCombatStrike(name: String, damage: CGFloat, recoil: CGFloat) {
                isAttacking = true
                SoundManager.instance.playClickSound()
                SoundManager.instance.triggerHaptic(intensity: hapticIntensity)
                
                bossHP = max(0, bossHP - damage)
                playerHP = max(0, playerHP - recoil)
                
                var logMessage = "⚔️ You used [\(name)] dealing \(Int(damage)) damage to Cyber Titan.\n"
                if recoil > 0 { logMessage += "⚠️ Counter-shock wave hit you for \(Int(recoil)) damage.\n" }
                
                if bossHP > 0 {
                    let bossCounter = CGFloat.random(in: 12...25)
                    playerHP = max(0, playerHP - bossCounter)
                    logMessage += "💥 Titan counter-attacked with Mega-Missile dealing \(Int(bossCounter)) damage.\n"
                } else {
                    gameWon = true
                    gameEnded = true
                    logMessage += "🏆 The Gatekeeper has been destroyed! Core accessed.\n"
                }
                
                if playerHP <= 0 {
                    gameWon = false
                    gameEnded = true
                }
                
                storyLog = logMessage + "\n" + storyLog
                DispatchQueue.main.asyncAfter(deadline: .now() + 0.2) { isAttacking = false }
            }
            
            private func reloadGameArena() {
                playerHP = 100.0
                bossHP = 200.0
                gameEnded = false
                gameWon = false
                storyLog = "▶ Mainframe rebooted. Story re-initialized. Sector-X target updated."
            }
        }

        struct GameActionPad: View {
            let icon: String
            let label: String
            let sub: String
            let color: Color
            var body: some View {
                VStack(spacing: 3) {
                    Image(systemName: icon).font(.system(size: 16)).foregroundColor(color)
                    Text(label).font(.system(size: 10, weight: .black, design: .monospaced)).foregroundColor(.white)
                    Text(sub).font(.system(size: 8)).foregroundColor(.gray)
                }
                .frame(width: 115, height: 55)
                .background(Color.black.opacity(0.7))
                .cornerRadius(8)
                .overlay(RoundedRectangle(cornerRadius: 8).stroke(color.opacity(0.5), lineWidth: 1))
            }
        }
        EOF

        # (ছ) ল্যান্ডস্কেপ লকড Info.plist তৈরি
        cat << 'EOF' > GameApp/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleIdentifier</key>
            <string>com.automation.GameApp</string>
            <key>CFBundleExecutable</key>
            <string>GameApp</string>
            <key>CFBundleName</key>
            <string>GameApp</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>UILaunchScreen</key>
            <dict/>
            <key>UISupportedInterfaceOrientations</key>
            <array>
                <string>UIInterfaceOrientationLandscapeLeft</string>
                <string>UIInterfaceOrientationLandscapeRight</string>
            </array>
            <key>UISupportedInterfaceOrientations~ipad</key>
            <array>
                <string>UIInterfaceOrientationLandscapeLeft</string>
                <string>UIInterfaceOrientationLandscapeRight</string>
            </array>
        </dict>
        </plist>
        EOF

    # ৪. আপনার আপলোড করা সব এসেট ভেরিফাই করে প্রজেক্ট ফোল্ডারে কপি করা
    - name: Move All Media Assets to App Folder
      run: |
        if [ -f "background.mp4" ] && [ -f "game_background.mp4" ] && [ -f "click.mp3" ]; then
          cp background.mp4 GameApp/
          cp game_background.mp4 GameApp/
          cp click.mp3 GameApp/
          echo "সবগুলো মিডিয়া এবং অডিও এসেট সফলভাবে লোড হয়েছে।"
        else
          echo "ERROR: background.mp4, game_background.mp4 অথবা click.mp3 ফাইল মিসিং আছে!"
          exit 1
        fi

    # ৫. XcodeGen এর জন্য কনফিগারেশন (project.yml) তৈরি করা
    - name: Create XcodeGen Specification
      run: |
        cat << 'EOF' > project.yml
        name: GameApp
        options:
          bundleIdPrefix: com.automation
        targets:
          GameApp:
            type: application
            platform: iOS
            deploymentTarget: "15.0"
            sources: [GameApp]
            info:
              path: GameApp/Info.plist
        EOF

    # ৬. রানারের ভেতরে স্বয়ংক্রিয়ভাবে .xcodeproj ফাইল জেনারেট করা
    - name: Generate Xcode Project File
      run: xcodegen generate

    # ৭. অ্যাপল সার্টিফিকেট ছাড়া ল্যান্ডস্কেপ অ্যাপটি কম্পাইল করা (Unsigned Build)
    - name: Compile iOS App (No-Sign)
      run: |
        xcodebuild clean build \
          -project "GameApp.xcodeproj" \
          -scheme "GameApp" \
          -sdk iphoneos \
          -configuration Release \
          -derivedDataPath build_output \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_PROFILE_SPECIFIER="" \
          COMPILER_INDEX_STORE_ENABLE=NO

    # ৮. বিল্ড হওয়া ফাইলকে অফিসিয়াল Unsigned .ipa ফরম্যাটে প্যাকেজ করা
    - name: Package App into Unsigned IPA
      run: |
        mkdir -p Payload
        cp -r build_output/Build/Products/Release-iphoneos/GameApp.app Payload/
        zip -r GameApp.ipa Payload

    # ৯. তৈরি হওয়া ফাইনাল ল্যান্ডস্কেপ .ipa ফাইলটি গিটহাবে আপলোড করা
    - name: Upload Final IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GameZone-AAA-Final-Edition
        path: GameApp.ipa
