name: Ultimate Auto iOS Landscape Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  generate-and-build:
    runs-on: macos-latest

    steps:
    # ১. গিটহাব থেকে আপনার আপলোড করা সব মিডিয়া ফাইল রানারে নিয়ে আসা
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ২. এক্সকোড প্রজেক্ট তৈরি করার জন্য XcodeGen টুল ইনস্টল করা
    - name: Install XcodeGen
      run: brew install xcodegen

    # ৩. ক্লাউডে ফোল্ডার তৈরি করে ট্রিপল-এ মেমরি-অপ্টিমাইজড গেম কোড রাইট করা
    - name: Create App Source Files
      run: |
        mkdir -p GameApp
        
        # (ক) অ্যাপের মেইন এন্ট্রি পয়েন্ট ফাইল তৈরি
        cat << 'EOF' > GameApp/GameAppApp.swift
        import SwiftUI

        @main
        struct GameAppApp: App {
            var body: some Scene {
                WindowGroup {
                    ContentView()
                }
            }
        }
        EOF

        # (খ) সাউন্ড এবং হ্যাপটিক্স (ভাইব্রেশন) কন্ট্রোল ইঞ্জিন
        cat << 'EOF' > GameApp/SoundManager.swift
        import AVFoundation
        import UIKit

        class SoundManager {
            static let instance = SoundManager()
            var audioPlayer: AVAudioPlayer?

            func playClickSound() {
                guard let path = Bundle.main.path(forResource: "click", ofType: "mp3") else { return }
                let url = URL(fileURLWithPath: path)
                do {
                    audioPlayer = try AVAudioPlayer(contentsOf: url)
                    audioPlayer?.prepareToPlay()
                    audioPlayer?.play()
                } catch {
                    print("Sound error: \(error.localizedDescription)")
                }
            }
            
            func triggerHaptic(intensity: Double) {
                guard intensity > 0 else { return }
                let generator = UIImpactFeedbackGenerator(style: intensity > 0.6 ? .heavy : (intensity > 0.3 ? .medium : .light))
                generator.prepare()
                generator.impactOccurred()
            }
        }
        EOF

        # (গ) লুপে ভিডিও চালানোর মেমরি-সেফ ব্যাকগ্রাউন্ড রেন্ডারার (Leak Proof)
        cat << 'EOF' > GameApp/LoopingVideoPlayer.swift
        import SwiftUI
        import AVFoundation

        struct LoopingVideoPlayer: UIViewRepresentable {
            let videoName: String
            
            class Coordinator: NSObject {
                var player: AVPlayer?
                var observer: AnyObject?
            }
            
            func makeCoordinator() -> Coordinator { Coordinator() }

            func makeUIView(context: Context) -> UIView {
                guard let path = Bundle.main.path(forResource: videoName, ofType: "mp4") else { return UIView() }
                let url = URL(fileURLWithPath: path)
                let player = AVPlayer(url: url)
                context.coordinator.player = player
                
                let view = VideoPlayerUIView(player: player)
                
                context.coordinator.observer = NotificationCenter.default.addObserver(
                    forName: .AVPlayerItemDidPlayToEndTime,
                    object: player.currentItem,
                    queue: .main
                ) { [weak player] _ in
                    player?.seek(to: .zero)
                    player?.play()
                }
                
                player.play()
                return view
            }
            
            func updateUIView(_ uiView: UIView, context: Context) {}
            
            static func dismantleUIView(_ uiView: UIView, coordinator: Coordinator) {
                coordinator.player?.pause()
                if let observer = coordinator.observer {
                    NotificationCenter.default.removeObserver(observer)
                }
                coordinator.player = nil
            }
        }

        class VideoPlayerUIView: UIView {
            private var playerLayer: AVPlayerLayer?
            init(player: AVPlayer) {
                super.init(frame: .zero)
                let playerLayer = AVPlayerLayer(player: player)
                playerLayer.videoGravity = .resizeAspectFill
                self.layer.addSublayer(playerLayer)
                self.playerLayer = playerLayer
            }
            required init?(coder: NSCoder) { fatalError() }
            override func layoutSubviews() { super.layoutSubviews() ; playerLayer?.frame = self.bounds }
        }
        EOF

        # (ঘ) মূল ৩টি পেজের ইউনিফাইড কোডবেস - টাইপ-চেক অপ্টিমাইজড (ContentView.swift)
        cat << 'EOF' > GameApp/ContentView.swift
        import SwiftUI

        enum GameStateScreen { case page1Home, page2HubMenu, page3EpicGame }

        struct ContentView: View {
            @State private var currentScreen: GameStateScreen = .page1Home
            @State private var isGlowing = false
            @State private var showOptionsOverlay = false
            
            // গেম সেটিংস কনফিগারেশন স্টেট
            @State private var graphicsQuality = "Ultra"
            @State private var controllerType = "Joystick"
            @State private var soundVolume: Double = 0.8
            @State private var hapticIntensity: Double = 0.6
            
            var body: some View {
                ZStack {
                    switch currentScreen {
                    case .page1Home:
                        HomeView(currentScreen: $currentScreen, isGlowing: $isGlowing)
                        
                    case .page2HubMenu:
                        HubMenuView(currentScreen: $currentScreen, showOptionsOverlay: $showOptionsOverlay, hapticIntensity: hapticIntensity)
                        
                    case .page3EpicGame:
                        PremiumAAAGameEngineView(
                            currentScreen: $currentScreen,
                            graphicsQuality: graphicsQuality,
                            soundVolume: soundVolume,
                            hapticIntensity: hapticIntensity
                        )
                    }
                    
                    if showOptionsOverlay {
                        OptionsOverlayView(
                            showOptionsOverlay: $showOptionsOverlay,
                            soundVolume: $soundVolume,
                            hapticIntensity: $hapticIntensity,
                            graphicsQuality: $graphicsQuality
                        )
                    }
                }
            }
        }

        // ==================== [সাব-ভিউ ১: হোম স্ক্রিন কম্পোনেন্ট] ====================
        struct HomeView: View {
            @Binding var currentScreen: GameStateScreen
            @Binding var isGlowing: Bool
            
            var body: some View {
                ZStack {
                    LoopingVideoPlayer(videoName: "background")
                        .ignoresSafeArea()
                    
                    VStack {
                        Spacer()
                        Text("TAP TO SCREEN")
                            .font(.system(size: 16, weight: .bold, design: .monospaced))
                            .foregroundColor(.white)
                            .tracking(5)
                            .opacity(isGlowing ? 1.0 : 0.15)
                            .shadow(color: .white.opacity(0.8), radius: isGlowing ? 12 : 1)
                            .onAppear {
                                withAnimation(.easeInOut(duration: 1.8).repeatForever(autoreverses: true)) {
                                    isGlowing = true
                                }
                            }
                            .onTapGesture {
                                SoundManager.instance.playClickSound()
                                withAnimation(.easeInOut(duration: 0.4)) { currentScreen = .page2HubMenu }
                            }
                    }
                    .padding(.bottom, 35)
                }
            }
        }

        // ==================== [সাব-ভিউ ২: বাটন মেনু হাব কম্পোনেন্ট] ====================
        struct HubMenuView: View {
            @Binding var currentScreen: GameStateScreen
            @Binding var showOptionsOverlay: Bool
            let hapticIntensity: Double
            
            var body: some View {
                ZStack {
                    LoopingVideoPlayer(videoName: "game_background")
                        .ignoresSafeArea()
                    
                    VStack(spacing: 25) {
                        Text("NEON OVERLORD HUB")
                            .font(.system(size: 32, weight: .black, design: .monospaced))
                            .foregroundColor(.white)
                            .shadow(color: .cyan, radius: 10)
                            .padding(.bottom, 20)
                        
                        Button(action: {
                            SoundManager.instance.playClickSound()
                            SoundManager.instance.triggerHaptic(intensity: hapticIntensity)
                            withAnimation(.spring()) { currentScreen = .page3EpicGame }
                        }) {
                            MenuButtonDesign(text: "START GAME", color: .green)
                        }
                        
                        Button(action: {
                            SoundManager.instance.playClickSound()
                            SoundManager.instance.triggerHaptic(intensity: hapticIntensity)
                            withAnimation(.easeInOut(duration: 0.3)) { showOptionsOverlay = true }
                        }) {
                            MenuButtonDesign(text: "OPTIONS", color: .cyan)
                        }
                        
                        Button(action: {
                            SoundManager.instance.playClickSound()
                            withAnimation(.easeInOut(duration: 0.4)) { currentScreen = .page1Home }
                        }) {
                            MenuButtonDesign(text: "QUICK EXIT", color: .red)
                        }
                    }
                    .padding()
                }
            }
        }

        // ==================== [সাব-ভিউ ৩: অপশন প্যানেল ওভারলে কম্পোনেন্ট - FIXED] ====================
        struct OptionsOverlayView: View {
            @Binding var showOptionsOverlay: Bool
            @Binding var soundVolume: Double
            @Binding var hapticIntensity: Double
            @Binding var graphicsQuality: String
            
            var body: some View {
                ZStack {
                    Color.black.opacity(0.8)
                        .ignoresSafeArea()
                        .onTapGesture { withAnimation { showOptionsOverlay = false } }
                    
                    VStack(spacing: 20) {
                        HStack {
                            Text("SYSTEM OPTIONS")
                                .font(.system(size: 20, weight: .black, design: .monospaced))
                                .foregroundColor(.cyan)
                            Spacer()
                            Button(action: { withAnimation { showOptionsOverlay = false } }) {
                                Image(systemName: "xmark.circle.fill").font(.title2).foregroundColor(.white)
                            }
                        }
                        
                        Divider().background(Color.white.opacity(0.3))
                        
                        // [FIXED]: alignment প্যামিটার সঠিকভাবে ফিক্স করা হয়েছে
                        VStack(alignment: .leading, spacing: 5) {
                            Text("AUDIO VOLUME: \(Int(soundVolume * 100))%").font(.caption).foregroundColor(.gray)
                            Slider(value: $soundVolume, in: 0...1).accentColor(.cyan)
                        }
                        
                        VStack(alignment: .leading, spacing: 5) {
                            Text("HAPTIC INTENSITY: \(Int(hapticIntensity * 100))%").font(.caption).foregroundColor(.gray)
                            Slider(value: $hapticIntensity, in: 0...1).accentColor(.purple)
                        }
                        
                        HStack {
                            Text("GRAPHICS:").font(.caption).foregroundColor(.gray)
                            Picker("Graphics", selection: $graphicsQuality) {
                                ForEach(["Low", "Medium", "High", "Ultra"], id: \.self) { Text($0) }
                            }.pickerStyle(SegmentedPickerStyle())
                        }
                    }
                    .padding(25)
                    .frame(width: 450)
                    .background(Color(white: 0.07))
                    .cornerRadius(16)
                    .overlay(RoundedRectangle(cornerRadius: 16).stroke(Color.cyan.opacity(0.5), lineWidth: 1.5))
                    .shadow(color: .cyan.opacity(0.3), radius: 20)
                }
            }
        }

        struct MenuButtonDesign: View {
            let text: String
            let color: Color
            var body: some View {
                Text(text)
                    .font(.system(size: 16, weight: .black, design: .monospaced))
                    .foregroundColor(color)
                    .frame(width: 240)
                    .padding(.vertical, 12)
                    .background(Color.black.opacity(0.6))
                    .cornerRadius(10)
                    .overlay(RoundedRectangle(cornerRadius: 10).stroke(color.opacity(0.8), lineWidth: 1.5))
            }
        }
        EOF

        # (ঙ) থার্ড পেজের জন্য প্রিমিয়াম AAA এআই গেমভিউ ইঞ্জিন কোড
        cat << 'EOF' > GameApp/PremiumAAAGameEngineView.swift
        import SwiftUI

        struct PremiumAAAGameEngineView: View {
            @Binding var currentScreen: GameStateScreen
            
            let graphicsQuality: String
            let soundVolume: Double
            let hapticIntensity: Double
            
            @State private var playerHP: CGFloat = 100.0
            @State private var bossHP: CGFloat = 300.0
            @State private var ultimateGauge: CGFloat = 0.0
            @State private var playerPositionX: CGFloat = 0.0
            @State private var playerCombo = 0
            
            @State private var aiStatusText = "AI Status: Scanning player stance..."
            @State private var combatDialogue = "SYS LOGIN: Welcome Operator. The Rogue AI Core has taken full control of the city mainframe. Move and strike before signature trace completes."
            @State private var isPlayerAttacking = false
            @State private var isBossDashing = false
            @State private var isMatchEnded = false
            @State private var userWon = false

            var body: some View {
                HStack(spacing: 0) {
                    VStack(alignment: .leading, spacing: 12) {
                        HStack {
                            Text("🎮 CONSOLE INTERFACE")
                                .font(.system(size: 11, weight: .black, design: .monospaced))
                                .foregroundColor(.cyan)
                            Spacer()
                            Text(graphicsQuality.uppercased()).font(.system(size: 9, weight: .bold)).foregroundColor(.green)
                        }
                        
                        Divider().background(Color.white.opacity(0.2))
                        
                        VStack(alignment: .leading, spacing: 4) {
                            Text("🧠 BOSS AI INTELLIGENCE SYSTEM")
                                .font(.system(size: 9, weight: .bold, design: .monospaced))
                                .foregroundColor(.orange)
                            Text(aiStatusText)
                                .font(.system(size: 10, weight: .medium, design: .monospaced))
                                .foregroundColor(.yellow)
                                .padding(6)
                                .frame(maxWidth: .infinity, alignment: .leading)
                                .background(Color.orange.opacity(0.1))
                                .cornerRadius(5)
                        }
                        
                        Text("STORY LINE & LIVE DIALOGUE")
                            .font(.system(size: 10, weight: .bold, design: .monospaced))
                            .foregroundColor(.gray)
                        
                        ScrollView {
                            Text(combatDialogue)
                                .font(.system(size: 11, weight: .regular, design: .default))
                                .foregroundColor(.white.opacity(0.85))
                                .padding(8)
                                .frame(maxWidth: .infinity, alignment: .topLeading)
                                .background(Color.white.opacity(0.02))
                                .cornerRadius(6)
                        }
                        
                        Spacer()
                        
                        Button(action: {
                            SoundManager.instance.playClickSound()
                            withAnimation { currentScreen = .page2HubMenu }
                        }) {
                            Text("ABORT MISSION (EXIT)")
                                .font(.system(size: 11, weight: .bold, design: .monospaced))
                                .foregroundColor(.red)
                                .frame(maxWidth: .infinity)
                                .padding(.vertical, 8)
                                .background(Color.red.opacity(0.1))
                                .cornerRadius(6)
                                .overlay(RoundedRectangle(cornerRadius: 6).stroke(Color.red.opacity(0.3), lineWidth: 1))
                        }
                    }
                    .padding(12)
                    .frame(width: 260)
                    .background(Color(white: 0.03))
                    .overlay(Rectangle().frame(width: 1).foregroundColor(.white.opacity(0.08)), alignment: .trailing)
                    
                    ZStack {
                        Color.black.ignoresSafeArea()
                        
                        LinearGradient(colors: [.cyan.opacity(graphicsQuality == "Ultra" ? 0.2 : 0.02), .black], startPoint: .top, endPoint: .bottom)
                            .ignoresSafeArea()
                        
                        VStack(spacing: 12) {
                            VStack(alignment: .leading, spacing: 3) {
                                HStack {
                                    Text("🤖 PROTOCOL OVERLORD OVERMIND v4.0")
                                        .font(.system(size: 11, weight: .black, design: .monospaced))
                                        .foregroundColor(.red)
                                    Spacer()
                                    Text("\(Int(bossHP)) HP").font(.caption).foregroundColor(.gray)
                                }
                                GeometryReader { geo in
                                    ZStack(alignment: .leading) {
                                        Capsule().fill(Color.red.opacity(0.15))
                                        Capsule().fill(LinearGradient(colors: [.red, .purple], startPoint: .leading, endPoint: .trailing))
                                            .frame(width: max(0, (bossHP / 300.0) * geo.size.width))
                                    }
                                }.frame(height: 8)
                            }
                            .padding(.horizontal, 15)
                            
                            Spacer()
                            
                            HStack(spacing: 80) {
                                VStack(spacing: 2) {
                                    Text("⚡️ COMBO x\(playerCombo)").font(.system(size: 10, weight: .bold)).foregroundColor(.yellow).opacity(playerCombo > 0 ? 1 : 0)
                                    Text("👤")
                                        .font(.system(size: 48))
                                        .offset(x: playerPositionX + (isPlayerAttacking ? 40 : 0))
                                        .shadow(color: .cyan, radius: isPlayerAttacking ? 20 : 2)
                                }
                                
                                Text("VS")
                                    .font(.system(size: 14, weight: .black, design: .monospaced))
                                    .foregroundColor(.white.opacity(0.15))
                                
                                Text("👹")
                                    .font(.system(size: 52))
                                    .offset(x: isBossDashing ? -30 : 0)
                                    .scaleEffect(bossHP > 0 ? 1.0 : 0.0)
                                    .rotationEffect(.degrees(bossHP > 0 ? 0 : 180))
                                    .shadow(color: .red, radius: isBossDashing ? 25 : 5)
                            }
                            .animation(.spring(response: 0.22, dampingFraction: 0.45), value: playerPositionX)
                            .animation(.spring(response: 0.22, dampingFraction: 0.45), value: isPlayerAttacking)
                            .animation(.easeInOut(duration: 0.2), value: isBossDashing)
                            
                            Spacer()
                            
                            VStack(spacing: 8) {
                                HStack {
                                    VStack(alignment: .leading, spacing: 3) {
                                        Text("💖 INTERACTION CORE HP: \(Int(playerHP))%")
                                            .font(.system(size: 10, weight: .bold, design: .monospaced)).foregroundColor(.cyan)
                                        GeometryReader { geo in
                                            ZStack(alignment: .leading) {
                                                Capsule().fill(Color.cyan.opacity(0.2))
                                                Capsule().fill(Color.cyan)
                                                    .frame(width: max(0, (playerHP / 100.0) * geo.size.width))
                                            }
                                        }.frame(height: 6)
                                    }
                                    
                                    VStack(alignment: .leading, spacing: 3) {
                                        Text("🔥 ULTIMATE AWAKENING: \(Int(ultimateGauge))%")
                                            .font(.system(size: 10, weight: .bold, design: .monospaced)).foregroundColor(.yellow)
                                        GeometryReader { geo in
                                            ZStack(alignment: .leading) {
                                                Capsule().fill(Color.yellow.opacity(0.2))
                                                Capsule().fill(Color.yellow)
                                                    .frame(width: max(0, (ultimateGauge / 100.0) * geo.size.width))
                                            }
                                        }.frame(height: 6)
                                    }.frame(width: 160)
                                }
                                .padding(.horizontal, 5)
                                
                                HStack(spacing: 12) {
                                    Button(action: {
                                        SoundManager.instance.triggerHaptic(intensity: hapticIntensity)
                                        withAnimation { playerPositionX = playerPositionX == 0 ? -25 : 0 }
                                        combatDialogue = "► [TACTICAL MANEUVER] You dashed sideways to break AI targeting line.\n" + combatDialogue
                                    }) {
                                        ActionControlPad(icon: "arrow.left.and.right.righttriangle.left.righttriangle.right", label: "TACTICAL DASH", sub: "Evade Attack", color: .purple)
                                    }
                                    
                                    Button(action: { executeAdvancedStrike(style: "PLASMA GUN BURST", dmg: 20, isUlt: false) }) {
                                        ActionControlPad(icon: "scope", label: "PLASMA BLAST", sub: "Ranged Fire", color: .cyan)
                                    }.disabled(isMatchEnded)
                                    
                                    Button(action: { executeAdvancedStrike(style: "LIGHTNING MELEE SWORD", dmg: 45, isUlt: false) }) {
                                        ActionControlPad(icon: "bolt.shield.fill", label: "LIGHTNING BLADE", sub: "+25% Ult Charge", color: .orange)
                                    }.disabled(isMatchEnded)
                                    
                                    Button(action: { executeAdvancedStrike(style: "QUANTUM AWAKENING NUKE", dmg: 110, isUlt: true) }) {
                                        ActionControlPad(icon: "shifter.fill", label: "ULTIMATE STRIKE", sub: "Requires 100% Ult", color: ultimateGauge >= 100 ? .yellow : .gray)
                                    }.disabled(ultimateGauge < 100 || isMatchEnded)
                                }
                            }
                            .padding(10)
                            .background(Color.white.opacity(0.02))
                            .cornerRadius(12)
                        }
                        .padding(12)
                        
                        if isMatchEnded {
                            Color.black.opacity(0.95).ignoresSafeArea()
                            VStack(spacing: 15) {
                                Text(userWon ? "MISSION ACCOMPLISHED" : "CORE DEFEAT: DISCONNECTED")
                                    .font(.system(size: 26, weight: .black, design: .monospaced))
                                    .foregroundColor(userWon ? .green : .red)
                                    .shadow(color: userWon ? .green : .red, radius: 10)
                                
                                Text(userWon ? "The Rogue Overlord has been successfully wiped from the cyber grid." : "Your matrix core was overwhelmed by the AI's predictive algorithms.")
                                    .font(.subheadline).foregroundColor(.gray).multilineTextAlignment(.center)
                                
                                Button(action: { restartConsoleEngine() }) {
                                    Text("RESPAWN INSIDE MATRIX")
                                        .font(.system(size: 13, weight: .bold, design: .monospaced))
                                        .foregroundColor(.white)
                                        .padding(.vertical, 10)
                                        .padding(.horizontal, 25)
                                        .background(userWon ? Color.green : Color.red)
                                        .cornerRadius(8)
                                }
                            }
                        }
                    }
                }
            }
            
            private func executeAdvancedStrike(style: String, dmg: CGFloat, isUlt: Bool) {
                isPlayerAttacking = true
                SoundManager.instance.playClickSound()
                SoundManager.instance.triggerHaptic(intensity: hapticIntensity)
                
                if isUlt { ultimateGauge = 0 } else { ultimateGauge = min(100, ultimateGauge + 25) }
                
                bossHP = max(0, bossHP - dmg)
                playerCombo += 1
                
                var roundLog = "⚔️ You executed [\(style)] doing \(Int(dmg)) damage to Overlord.\n"
                
                if bossHP > 0 {
                    let aiRoll = Int.random(in: 1...3)
                    if aiRoll == 1 {
                        isBossDashing = true
                        aiStatusText = "AI Status: Evading player blast vectors!"
                        let counterDmg = CGFloat.random(in: 8...15)
                        playerHP = max(0, playerHP - counterDmg)
                        roundLog += "💥 Boss AI predicted your movement and counter-shot for \(Int(counterDmg)) HP.\n"
                    } else if aiRoll == 2 {
                        aiStatusText = "AI Status: Overclocking damage output!"
                        let heavyDmg = CGFloat.random(in: 18...28)
                        playerHP = max(0, playerHP - heavyDmg)
                        roundLog += "🚨 Critical Hit! Boss AI launched Sonic Pulse for \(Int(heavyDmg)) HP.\n"
                    } else {
                        aiStatusText = "AI Status: Analysing current combo pattern..."
                        roundLog += "🛡️ Boss AI absorbed part of your blow to run pattern metrics.\n"
                    }
                } else {
                    userWon = true
                    isMatchEnded = true
                    roundLog += "🏆 CRITICAL BREAK! You completely shattered the AI Core Mainframe!\n"
                }
                
                if playerHP <= 0 { isMatchEnded = true }
                
                combatDialogue = roundLog + "\n" + combatDialogue
                
                DispatchQueue.main.asyncAfter(deadline: .now() + 0.15) {
                    isPlayerAttacking = false
                    isBossDashing = false
                }
            }
            
            private func restartConsoleEngine() {
                playerHP = 100.0
                bossHP = 300.0
                ultimateGauge = 0.0
                playerCombo = 0
                playerPositionX = 0.0
                isMatchEnded = false
                userWon = false
                aiStatusText = "AI Status: Re-scanning network signatures..."
                combatDialogue = "SYS REBOOTED: System restored. Target re-acquired. Breach the defensive matrix again."
            }
        }

        struct ActionControlPad: View {
            let icon: String
            let label: String
            let sub: String
            let color: Color
            var body: some View {
                VStack(spacing: 2) {
                    Image(systemName: icon).font(.system(size: 15)).foregroundColor(color)
                    Text(label).font(.system(size: 9, weight: .black, design: .monospaced)).foregroundColor(.white)
                    Text(sub).font(.system(size: 7)).foregroundColor(.gray)
                }
                .frame(width: 108, height: 52)
                .background(Color.black.opacity(0.75))
                .cornerRadius(8)
                .overlay(RoundedRectangle(cornerRadius: 8).stroke(color.opacity(0.4), lineWidth: 1))
            }
        }
        EOF

        # (ছ) ল্যান্ডস্কেপ লকড Info.plist তৈরি
        cat << 'EOF' > GameApp/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleIdentifier</key>
            <string>com.automation.GameApp</string>
            <key>CFBundleExecutable</key>
            <string>GameApp</string>
            <key>CFBundleName</key>
            <string>GameApp</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>UILaunchScreen</key>
            <dict/>
            <key>UISupportedInterfaceOrientations</key>
            <array>
                <string>UIInterfaceOrientationLandscapeLeft</string>
                <string>UIInterfaceOrientationLandscapeRight</string>
            </array>
            <key>UISupportedInterfaceOrientations~ipad</key>
            <array>
                <string>UIInterfaceOrientationLandscapeLeft</string>
                <string>UIInterfaceOrientationLandscapeRight</string>
            </array>
        </dict>
        </plist>
        EOF

    # ৪. আপনার আপলোড করা সব এসেট ভেরিফাই করে প্রজেক্ট ফোল্ডারে কপি করা
    - name: Move All Media Assets to App Folder
      run: |
        if [ -f "background.mp4" ] && [ -f "game_background.mp4" ] && [ -f "click.mp3" ]; then
          cp background.mp4 GameApp/
          cp game_background.mp4 GameApp/
          cp click.mp3 GameApp/
          echo "সবগুলো মিডিয়া এবং অডিও এসেট সফলভাবে লোড হয়েছে।"
        else
          echo "ERROR: background.mp4, game_background.mp4 অথবা click.mp3 ফাইল মিসিং আছে!"
          exit 1
        fi

    # ৫. XcodeGen এর জন্য কনফিগারেশন (project.yml) তৈরি করা
    - name: Create XcodeGen Specification
      run: |
        cat << 'EOF' > project.yml
        name: GameApp
        options:
          bundleIdPrefix: com.automation
        targets:
          GameApp:
            type: application
            platform: iOS
            deploymentTarget: "15.0"
            sources: [GameApp]
            info:
              path: GameApp/Info.plist
        EOF

    # ৬. রানারের ভেতরে স্বয়ংক্রিয়ভাবে .xcodeproj ফাইল জেনারেট করা
    - name: Generate Xcode Project File
      run: xcodegen generate

    # ७. অ্যাপল সার্টিফিকেট ছাড়া ল্যান্ডস্কেপ অ্যাপটি কম্পাইল করা (Unsigned Build)
    - name: Compile iOS App (No-Sign)
      run: |
        xcodebuild clean build \
          -project "GameApp.xcodeproj" \
          -scheme "GameApp" \
          -sdk iphoneos \
          -configuration Release \
          -derivedDataPath build_output \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_PROFILE_SPECIFIER="" \
          COMPILER_INDEX_STORE_ENABLE=NO

    # ৮. বিল্ড হওয়া ফাইলকে অফিসিয়াল Unsigned .ipa ফরম্যাটে প্যাকেজ করা
    - name: Package App into Unsigned IPA
      run: |
        mkdir -p Payload
        cp -r build_output/Build/Products/Release-iphoneos/GameApp.app Payload/
        zip -r GameApp.ipa Payload

    # ৯. তৈরি হওয়া ফাইনাল ল্যান্ডস্কেপ .ipa ফাইলটি গিটহাবে আপলোড করা
    - name: Upload Final IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GameZone-AAA-Intelligence-Edition
        path: GameApp.ipa
