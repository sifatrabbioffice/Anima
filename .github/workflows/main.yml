name: Ultimate Auto iOS Landscape Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  generate-and-build:
    runs-on: macos-latest

    steps:
    # ১. গিটহাব থেকে আপনার আপলোড করা সব মিডিয়া ফাইল রানারে নিয়ে আসা
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ২. এক্সকোড প্রজেক্ট তৈরি করার জন্য XcodeGen টুল ইনস্টল করা
    - name: Install XcodeGen
      run: brew install xcodegen

    # ৩. ক্লাউডে ফোল্ডার তৈরি করে ট্রিপল-এ মেমরি-অপ্টিমাইজড গেম কোড রাইট করা
    - name: Create App Source Files
      run: |
        mkdir -p GameApp
        
        # (ক) অ্যাপের মেইন এন্ট্রি পয়েন্ট ফাইল তৈরি
        cat << 'EOF' > GameApp/GameAppApp.swift
        import SwiftUI

        @main
        struct GameAppApp: App {
            var body: some Scene {
                WindowGroup {
                    ContentView()
                }
            }
        }
        EOF

        # (খ) সাউন্ড এবং হ্যাপটিক্স (ভাইব্রেশন) কন্ট্রোল ইঞ্জিন
        cat << 'EOF' > GameApp/SoundManager.swift
        import AVFoundation
        import UIKit

        class SoundManager {
            static let instance = SoundManager()
            var audioPlayer: AVAudioPlayer?

            func playClickSound() {
                guard let path = Bundle.main.path(forResource: "click", ofType: "mp3") else { return }
                let url = URL(fileURLWithPath: path)
                do {
                    audioPlayer = try AVAudioPlayer(contentsOf: url)
                    audioPlayer?.prepareToPlay()
                    audioPlayer?.play()
                } catch {
                    print("Sound error: \(error.localizedDescription)")
                }
            }
            
            func triggerHaptic(intensity: Double) {
                guard intensity > 0 else { return }
                let generator = UIImpactFeedbackGenerator(style: intensity > 0.6 ? .heavy : (intensity > 0.3 ? .medium : .light))
                generator.prepare()
                generator.impactOccurred()
            }
        }
        EOF

        # (গ) লুপে ভিডিও চালানোর মেমরি-সেফ ব্যাকগ্রাউন্ড রেন্ডারার (Leak Proof)
        cat << 'EOF' > GameApp/LoopingVideoPlayer.swift
        import SwiftUI
        import AVFoundation

        struct LoopingVideoPlayer: UIViewRepresentable {
            let videoName: String
            
            class Coordinator: NSObject {
                var player: AVPlayer?
                var observer: AnyObject?
            }
            
            func makeCoordinator() -> Coordinator { Coordinator() }

            func makeUIView(context: Context) -> UIView {
                guard let path = Bundle.main.path(forResource: videoName, ofType: "mp4") else { return UIView() }
                let url = URL(fileURLWithPath: path)
                let player = AVPlayer(url: url)
                context.coordinator.player = player
                
                let view = VideoPlayerUIView(player: player)
                
                context.coordinator.observer = NotificationCenter.default.addObserver(
                    forName: .AVPlayerItemDidPlayToEndTime,
                    object: player.currentItem,
                    queue: .main
                ) { [weak player] _ in
                    player?.seek(to: .zero)
                    player?.play()
                }
                
                player.play()
                return view
            }
            
            func updateUIView(_ uiView: UIView, context: Context) {}
            
            static func dismantleUIView(_ uiView: UIView, coordinator: Coordinator) {
                coordinator.player?.pause()
                if let observer = coordinator.observer {
                    NotificationCenter.default.removeObserver(observer)
                }
                coordinator.player = nil
            }
        }

        class VideoPlayerUIView: UIView {
            private var playerLayer: AVPlayerLayer?
            init(player: AVPlayer) {
                super.init(frame: .zero)
                let playerLayer = AVPlayerLayer(player: player)
                playerLayer.videoGravity = .resizeAspectFill
                self.layer.addSublayer(playerLayer)
                self.playerLayer = playerLayer
            }
            required init?(coder: NSCoder) { fatalError() }
            override func layoutSubviews() { super.layoutSubviews() ; playerLayer?.frame = self.bounds }
        }
        EOF

        # (ঘ) মূল ৩টি পেজের ইউনিফাইড কোডবেস - টাইপ-চেক অপ্টিমাইজড (ContentView.swift)
        cat << 'EOF' > GameApp/ContentView.swift
        import SwiftUI

        enum GameStateScreen { case page1Home, page2HubMenu, page3EpicGame }

        struct ContentView: View {
            @State private var currentScreen: GameStateScreen = .page1Home
            @State private var isGlowing = false
            @State private var showOptionsOverlay = false
            
            // গেম সেটিংস কনফিগারেশন স্টেট
            @State private var graphicsQuality = "Ultra"
            @State private var controllerType = "Joystick"
            @State private var soundVolume: Double = 0.8
            @State private var hapticIntensity: Double = 0.6
            
            var body: some View {
                ZStack {
                    switch currentScreen {
                    case .page1Home:
                        HomeView(currentScreen: $currentScreen, isGlowing: $isGlowing)
                        
                    case .page2HubMenu:
                        HubMenuView(currentScreen: $currentScreen, showOptionsOverlay: $showOptionsOverlay, hapticIntensity: hapticIntensity)
                        
                    case .page3EpicGame:
                        PremiumAAAGameEngineView(
                            currentScreen: $currentScreen,
                            graphicsQuality: graphicsQuality,
                            soundVolume: soundVolume,
                            hapticIntensity: hapticIntensity
                        )
                    }
                    
                    if showOptionsOverlay {
                        OptionsOverlayView(
                            showOptionsOverlay: $showOptionsOverlay,
                            soundVolume: $soundVolume,
                            hapticIntensity: $hapticIntensity,
                            graphicsQuality: $graphicsQuality
                        )
                    }
                }
            }
        }

        struct HomeView: View {
            @Binding var currentScreen: GameStateScreen
            @Binding var isGlowing: Bool
            
            var body: some View {
                ZStack {
                    LoopingVideoPlayer(videoName: "background")
                        .ignoresSafeArea()
                    
                    VStack {
                        Spacer()
                        Text("TAP TO SCREEN")
                            .font(.system(size: 16, weight: .bold, design: .monospaced))
                            .foregroundColor(.white)
                            .tracking(5)
                            .opacity(isGlowing ? 1.0 : 0.15)
                            .shadow(color: .white.opacity(0.8), radius: isGlowing ? 12 : 1)
                            .onAppear {
                                withAnimation(.easeInOut(duration: 1.8).repeatForever(autoreverses: true)) {
                                    isGlowing = true
                                }
                            }
                            .onTapGesture {
                                SoundManager.instance.playClickSound()
                                withAnimation(.easeInOut(duration: 0.4)) { currentScreen = .page2HubMenu }
                            }
                    }
                    .padding(.bottom, 35)
                }
            }
        }

        struct HubMenuView: View {
            @Binding var currentScreen: GameStateScreen
            @Binding var showOptionsOverlay: Bool
            let hapticIntensity: Double
            
            var body: some View {
                ZStack {
                    LoopingVideoPlayer(videoName: "game_background")
                        .ignoresSafeArea()
                    
                    VStack(spacing: 25) {
                        Text("NEON OVERLORD HUB")
                            .font(.system(size: 32, weight: .black, design: .monospaced))
                            .foregroundColor(.white)
                            .shadow(color: .cyan, radius: 10)
                            .padding(.bottom, 20)
                        
                        Button(action: {
                            SoundManager.instance.playClickSound()
                            SoundManager.instance.triggerHaptic(intensity: hapticIntensity)
                            withAnimation(.spring()) { currentScreen = .page3EpicGame }
                        }) {
                            MenuButtonDesign(text: "START GAME", color: .green)
                        }
                        
                        Button(action: {
                            SoundManager.instance.playClickSound()
                            SoundManager.instance.triggerHaptic(intensity: hapticIntensity)
                            withAnimation(.easeInOut(duration: 0.3)) { showOptionsOverlay = true }
                        }) {
                            MenuButtonDesign(text: "OPTIONS", color: .cyan)
                        }
                        
                        Button(action: {
                            SoundManager.instance.playClickSound()
                            withAnimation(.easeInOut(duration: 0.4)) { currentScreen = .page1Home }
                        }) {
                            MenuButtonDesign(text: "QUICK EXIT", color: .red)
                        }
                    }
                    .padding()
                }
            }
        }

        struct OptionsOverlayView: View {
            @Binding var showOptionsOverlay: Bool
            @Binding var soundVolume: Double
            @Binding var hapticIntensity: Double
            @Binding var graphicsQuality: String
            
            var body: some View {
                ZStack {
                    Color.black.opacity(0.8)
                        .ignoresSafeArea()
                        .onTapGesture { withAnimation { showOptionsOverlay = false } }
                    
                    VStack(spacing: 20) {
                        HStack {
                            Text("SYSTEM OPTIONS")
                                .font(.system(size: 20, weight: .black, design: .monospaced))
                                .foregroundColor(.cyan)
                            Spacer()
                            Button(action: { withAnimation { showOptionsOverlay = false } }) {
                                Image(systemName: "xmark.circle.fill").font(.title2).foregroundColor(.white)
                            }
                        }
                        
                        Divider().background(Color.white.opacity(0.3))
                        
                        VStack(alignment: .leading, spacing: 5) {
                            Text("AUDIO VOLUME: \(Int(soundVolume * 100))%").font(.caption).foregroundColor(.gray)
                            Slider(value: $soundVolume, in: 0...1).accentColor(.cyan)
                        }
                        
                        VStack(alignment: .leading, spacing: 5) {
                            Text("HAPTIC INTENSITY: \(Int(hapticIntensity * 100))%").font(.caption).foregroundColor(.gray)
                            Slider(value: $hapticIntensity, in: 0...1).accentColor(.purple)
                        }
                        
                        HStack {
                            Text("GRAPHICS:").font(.caption).foregroundColor(.gray)
                            Picker("Graphics", selection: $graphicsQuality) {
                                ForEach(["Low", "Medium", "High", "Ultra"], id: \.self) { Text($0) }
                            }.pickerStyle(SegmentedPickerStyle())
                        }
                    }
                    .padding(25)
                    .frame(width: 450)
                    .background(Color(white: 0.07))
                    .cornerRadius(16)
                    .overlay(RoundedRectangle(cornerRadius: 16).stroke(Color.cyan.opacity(0.5), lineWidth: 1.5))
                    .shadow(color: .cyan.opacity(0.3), radius: 20)
                }
            }
        }

        struct MenuButtonDesign: View {
            let text: String
            let color: Color
            var body: some View {
                Text(text)
                    .font(.system(size: 16, weight: .black, design: .monospaced))
                    .foregroundColor(color)
                    .frame(width: 240)
                    .padding(.vertical, 12)
                    .background(Color.black.opacity(0.6))
                    .cornerRadius(10)
                    .overlay(RoundedRectangle(cornerRadius: 10).stroke(color.opacity(0.8), lineWidth: 1.5))
            }
        }
        EOF

        # (ঙ) থার্ড পেজের জন্য সম্পূর্ণ নতুন হাই-পারফরম্যান্স মেটাল-ক্যানভাস গেম ইঞ্জিন কোড
        cat << 'EOF' > GameApp/PremiumAAAGameEngineView.swift
        import SwiftUI
        import Combine

        // গেম অবজেক্ট মডেল স্ট্রাকচারস
        struct SpaceLaser: Identifiable {
            let id = UUID()
            var position: CGPoint
        }

        struct AlienTarget: Identifiable {
            let id = UUID()
            var position: CGPoint
            var speed: CGFloat
            var radius: CGFloat
            var isBoss: Bool
        }

        struct VisualParticle: Identifiable {
            let id = UUID()
            var position: CGPoint
            var velocity: CGSize
            var color: Color
            var alpha: CGFloat
            var size: CGFloat
        }

        struct PremiumAAAGameEngineView: View {
            @Binding var currentScreen: GameStateScreen
            let graphicsQuality: String
            let soundVolume: Double
            let hapticIntensity: Double

            // স্টারশিপ স্টেট ইঞ্জিন
            @State private var shipPosition = CGPoint(x: 200, y: 260)
            @State private var score = 0
            @State private var shipShield: CGFloat = 100.0
            @State private var comboStreak = 0
            @State private var isGameOver = false

            // ক্যানভাস রেন্ডারিং অ্যারে লুপস
            @State private var activeLasers: [SpaceLaser] = []
            @State private var activeTargets: [AlienTarget] = []
            @State private var activeParticles: [VisualParticle] = []
            @State private var spaceDust: [CGPoint] = []

            // ৬০ এফপিএস টাইমার ড্রাইভার
            @State private var gameTimer = Timer.publish(every: 1/60, on: .main, in: .common).autoconnect()
            @State private var targetSpawnCounter = 0

            var body: some View {
                HStack(spacing: 0) {
                    
                    // [বাম পাশ]: সাইবারপঙ্ক ডায়াগনস্টিক অ্যান্ড কন্ট্রোল প্যানেল মেট্রিক্স
                    VStack(alignment: .leading, spacing: 14) {
                        Text("📡 CORE MATRIX DIAG")
                            .font(.system(size: 12, weight: .black, design: .monospaced))
                            .foregroundColor(.cyan)
                        
                        Divider().background(Color.white.opacity(0.2))

                        Group {
                            VStack(alignment: .leading, spacing: 2) {
                                Text("PLAYER SCORE").font(.system(size: 9, weight: .bold)).foregroundColor(.gray)
                                Text("\(score)").font(.system(size: 22, weight: .black, design: .monospaced)).foregroundColor(.green)
                            }
                            
                            VStack(alignment: .leading, spacing: 2) {
                                Text("COMBO MULTIPLIER").font(.system(size: 9, weight: .bold)).foregroundColor(.gray)
                                Text("x\(comboStreak)").font(.system(size: 16, weight: .black, design: .monospaced)).foregroundColor(.yellow)
                            }
                        }

                        VStack(alignment: .leading, spacing: 4) {
                            Text("SHIELD DEFENSE: \(Int(shipShield))%").font(.system(size: 10, weight: .bold, design: .monospaced)).foregroundColor(.cyan)
                            GeometryReader { geo in
                                ZStack(alignment: .leading) {
                                    Capsule().fill(Color.cyan.opacity(0.15))
                                    Capsule().fill(LinearGradient(colors: [.cyan, .blue], startPoint: .leading, endPoint: .trailing))
                                        .frame(width: max(0, (shipShield / 100.0) * geo.size.width))
                                }
                            }.frame(height: 7)
                        }

                        VStack(alignment: .leading, spacing: 4) {
                            Text("ENGINE GPU ENGINE").font(.system(size: 9, weight: .bold, design: .monospaced)).foregroundColor(.orange)
                            Text("MODE: METAL CANVAS\nFPS: 60Hz TRIPLE-A\nQUALITY: \(graphicsQuality.uppercased())")
                                .font(.system(size: 9, design: .monospaced))
                                .foregroundColor(.gray)
                                .padding(6)
                                .frame(maxWidth: .infinity, alignment: .leading)
                                .background(Color.white.opacity(0.03))
                                .cornerRadius(5)
                        }

                        Spacer()

                        Button(action: {
                            SoundManager.instance.playClickSound()
                            withAnimation { currentScreen = .page2HubMenu }
                        }) {
                            Text("ABORT AND LEAVE")
                                .font(.system(size: 11, weight: .bold, design: .monospaced))
                                .foregroundColor(.red)
                                .frame(maxWidth: .infinity)
                                .padding(.vertical, 8)
                                .background(Color.red.opacity(0.1))
                                .cornerRadius(6)
                                .overlay(RoundedRectangle(cornerRadius: 6).stroke(Color.red.opacity(0.3), lineWidth: 1))
                        }
                    }
                    .padding(14)
                    .frame(width: 200)
                    .background(Color(white: 0.02))
                    .overlay(Rectangle().frame(width: 1).foregroundColor(.white.opacity(0.08)), alignment: .trailing)

                    // [ডান পাশ]: হাই-পারফরম্যান্স মেটাল এসিলারেটেড গেমপ্লে ক্যানভাস ক্যানভাস
                    ZStack {
                        Color.black.ignoresSafeArea()
                        
                        // ৬০ এফপিএস রিয়েল-টাইম ড্রয়িং মেকানিজম
                        Canvas { context, size in
                            // ১. ব্যাকগ্রাউন্ড স্পেস ডাস্ট রেন্ডারিং
                            for pt in spaceDust {
                                context.fill(Path(ellipseIn: CGRect(x: pt.x, y: pt.y, width: 2, height: 2)), with: .color(.white.opacity(0.3)))
                            }

                            // ২. অ্যাক্টিভ লেজার বিম রেন্ডারিং (গ্লো ইফেক্ট সহ)
                            for laser in activeLasers {
                                var path = Path()
                                path.addEllipse(in: CGRect(x: laser.position.x, y: laser.position.y, width: 14, height: 4))
                                context.addFilter(.blur(radius: 1))
                                context.fill(path, with: .color(.cyan))
                            }

                            // ৩. শত্রু এলিয়েন শিপ রেন্ডারিং
                            for target in activeTargets {
                                let rect = CGRect(x: target.position.x - target.radius, y: target.position.y - target.radius, width: target.radius * 2, height: target.radius * 2)
                                context.draw(Text(target.isBoss ? "🛸" : "👾").font(.system(size: target.radius * 1.8)), in: rect)
                            }

                            // ৪. বিস্ফোরণের কণা নির্গমন (Particle System Rendering)
                            for particle in activeParticles {
                                var pPath = Path()
                                pPath.addEllipse(in: CGRect(x: particle.position.x, y: particle.position.y, width: particle.size, height: particle.size))
                                context.fill(pPath, with: .color(particle.color.opacity(Double(particle.alpha))))
                            }

                            // ৫. প্লেয়ারের নিজস্ব স্টারশিপ রেন্ডারিং (ক্যানভাসে ড্রয়িং)
                            if !isGameOver {
                                let shipRect = CGRect(x: shipPosition.x - 22, y: shipPosition.y - 22, width: 44, height: 44)
                                context.draw(Text("🚀"), in: shipRect)
                            }
                        }
                        .gesture(
                            DragGesture()
                                .onChanged { value in
                                    if !isGameOver {
                                        // স্ক্রিনের বাউন্ডারির মধ্যে ড্র্যাগ পজিশন লক করা হলো
                                        let targetY = value.location.y
                                        shipPosition.y = max(40, min(300, targetY))
                                    }
                                }
                        )

                        // স্ক্রিন টাচ ইন্ডিকেটর গাইড ওভারলে
                        VStack {
                            Spacer()
                            HStack {
                                Spacer()
                                Text("DRAG ANYWHERE ON RIGHT AREA TO MOVE SHIP UPPER/LOWER")
                                    .font(.system(size: 8, weight: .bold, design: .monospaced))
                                    .foregroundColor(.white.opacity(0.2))
                                    .padding(.bottom, 6)
                                Spacer()
                            }
                        }

                        // গেম ওভার স্ক্রিন প্যানেল মড্যুল
                        if isGameOver {
                            Color.black.opacity(0.9)
                                .ignoresSafeArea()
                            VStack(spacing: 14) {
                                Text("STARSHIP DESTROYED")
                                    .font(.system(size: 24, weight: .black, design: .monospaced))
                                    .foregroundColor(.red)
                                    .shadow(color: .red, radius: 10)
                                
                                Text("Final Score Breakdown: \(score) Points Matrix Core")
                                    .font(.caption).foregroundColor(.gray)

                                Button(action: { resetGameEngine() }) {
                                    Text("RESPAWN FIGHTER JET")
                                        .font(.system(size: 12, weight: .bold, design: .monospaced))
                                        .foregroundColor(.white)
                                        .padding(.vertical, 8)
                                        .padding(.horizontal, 20)
                                        .background(Color.green)
                                        .cornerRadius(6)
                                }
                            }
                        }
                    }
                }
                .onAppear { setupSpaceDustGrid() }
                .onReceive(gameTimer) { _ in
                    if !isGameOver {
                        updateGamePhysicsEngine()
                    }
                }
            }

            // স্টারফিল্ড গ্রিড ইনিশিয়েলাইজেশন (Background Starfield Map)
            private func setupSpaceDustGrid() {
                spaceDust = (0..<40).map { _ in
                    CGPoint(x: CGFloat.random(in: 10...600), y: CGFloat.random(in: 10...340))
                }
            }

            // গেমের ৬০ এফপিএস মেইন ফিজিক্স লুপ ক্যালকুলেটর (Core Math Loops)
            private func updateGamePhysicsEngine() {
                // ১. স্টারফিল্ড স্ক্রোলিং মোশন ইফেক্ট
                for i in 0..<spaceDust.count {
                    spaceDust[i].x -= 1.5
                    if spaceDust[i].x < 0 { spaceDust[i].x = 620 }
                }

                // ২. অটোমেটিক গান ফায়ারিং সিস্টেম ইন্টারভাল (লেজার স্পন লুপ)
                targetSpawnCounter += 1
                if targetSpawnCounter % 12 == 0 {
                    activeLasers.append(SpaceLaser(position: CGPoint(x: shipPosition.x + 20, y: shipPosition.y - 2)))
                    if graphicsQuality == "Ultra" {
                        SoundManager.instance.triggerHaptic(intensity: hapticIntensity * 0.3)
                    }
                }

                // ৩. স্ক্রিন মেমরি থেকে বাউন্ডারি ক্রস করা লেজার রিলিজ করা
                for i in 0..<activeLasers.count {
                    activeLasers[i].position.x += 8.5
                }
                activeLasers.removeAll { $0.position.x > 650 }

                // ৪. র্যান্ডম ইন্টারভালে শত্রু এলিয়েন শিপ স্পন করা
                if targetSpawnCounter % 40 == 0 {
                    let isBossTarget = Int.random(in: 1...7) == 4
                    activeTargets.append(AlienTarget(
                        position: CGPoint(x: 640, y: CGFloat.random(in: 30...310)),
                        speed: CGFloat.random(in: 2.0...4.5),
                        radius: isBossTarget ? 24 : 14,
                        isBoss: isBossTarget
                    ))
                }

                // ৫. শত্রুদের স্পেসশিপ বাম দিকে মুভ করানো
                for i in 0..<activeTargets.count {
                    activeTargets[i].position.x -= activeTargets[i].speed
                }
                
                // প্লেয়ার ডিফেন্স লাইন ক্রস করলে শিল্ড এনার্জি মাইনাস
                for target in activeTargets where target.position.x < -20 {
                    shipShield = max(0, shipShield - 10)
                    comboStreak = 0
                    if shipShield <= 0 { isGameOver = true }
                }
                activeTargets.removeAll { $0.position.x < -20 }

                // ৬. কণা নির্গমন ফিজিক্স আপডেট (Particle Lifecycle Calculations)
                for i in 0..<activeParticles.count {
                    activeParticles[i].position.x += activeParticles[i].velocity.width
                    activeParticles[i].position.y += activeParticles[i].velocity.height
                    activeParticles[i].position.y += 0.05 // গ্র্যাভিটি সিমুলেশন ডাউনফোর্স
                    activeParticles[i].alpha -= 0.03   // ফেড আউট ইফেক্ট রেট
                }
                activeParticles.removeAll { $0.alpha <= 0 }

                // ৭. লেজার এবং শত্রু শিপ সমূহের সংঘর্ষ লুপ (Collision Detection Matrix)
                var burntLasers = Set<UUID>()
                var burntTargets = Set<UUID>()

                for laser in activeLasers {
                    for target in activeTargets {
                        let distance = sqrt(pow(laser.position.x - target.position.x, 2) + pow(laser.position.y - target.position.y, 2))
                        if distance < (target.radius + 6) {
                            burntLasers.insert(laser.id)
                            burntTargets.insert(target.id)
                            
                            // পয়েন্ট এবং কম্বো ক্যালকুলেশন মেকানিজম
                            comboStreak += 1
                            score += target.isBoss ? (50 * comboStreak) : (10 * comboStreak)
                            
                            // হাই-স্পিড পার্টিকেল জেনারেশন কমান্ড
                            triggerParticleExplosion(at: target.position, color: target.isBoss ? .purple : .orange)
                            SoundManager.instance.triggerHaptic(intensity: hapticIntensity)
                        }
                    }
                }

                // ৮. প্লেয়ার ও শত্রুর ফিজিক্যাল কোলিশন চেক
                for target in activeTargets {
                    let distanceToShip = sqrt(pow(shipPosition.x - target.position.x, 2) + pow(shipPosition.y - target.position.y, 2))
                    if distanceToShip < (target.radius + 18) {
                        burntTargets.insert(target.id)
                        shipShield = max(0, shipShield - (target.isBoss ? 35 : 15))
                        comboStreak = 0
                        triggerParticleExplosion(at: shipPosition, color: .red)
                        if shipShield <= 0 { isGameOver = true }
                    }
                }

                // ক্লিনআপ মেমরি রিলিজ (Memory Deallocation)
                activeLasers.removeAll { burntLasers.contains($0.id) }
                activeTargets.removeAll { burntTargets.contains($0.id) }
            }

            // এক্সপ্লোশন জেনারেটর (High Fidelity Explosion Logic)
            private func triggerParticleExplosion(at point: CGPoint, color: Color) {
                let limit = graphicsQuality == "Ultra" ? 18 : 8
                for _ in 0..<limit {
                    let vx = CGFloat.random(in: -3.5...3.5)
                    let vy = CGFloat.random(in: -3.5...3.5)
                    activeParticles.append(VisualParticle(
                        position: point,
                        velocity: CGSize(width: vx, height: vy),
                        color: color,
                        alpha: 1.0,
                        size: CGFloat.random(in: 3...6)
                    ))
                }
            }

            // গেম রিস্টার্ট ইঞ্জিন রিসেট মেথড
            private func resetGameEngine() {
                shipPosition = CGPoint(x: 200, y: 260)
                score = 0
                shipShield = 100.0
                comboStreak = 0
                isGameOver = false
                activeLasers.removeAll()
                activeTargets.removeAll()
                activeParticles.removeAll()
                targetSpawnCounter = 0
            }
        }
        EOF

        # (ছ) ল্যান্ডস্কেপ লকড Info.plist তৈরি
        cat << 'EOF' > GameApp/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleIdentifier</key>
            <string>com.automation.GameApp</string>
            <key>CFBundleExecutable</key>
            <string>GameApp</string>
            <key>CFBundleName</key>
            <string>GameApp</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>UILaunchScreen</key>
            <dict/>
            <key>UISupportedInterfaceOrientations</key>
            <array>
                <string>UIInterfaceOrientationLandscapeLeft</string>
                <string>UIInterfaceOrientationLandscapeRight</string>
            </array>
            <key>UISupportedInterfaceOrientations~ipad</key>
            <array>
                <string>UIInterfaceOrientationLandscapeLeft</string>
                <string>UIInterfaceOrientationLandscapeRight</string>
            </array>
        </dict>
        </plist>
        EOF

    # ৪. আপনার আপলোড করা সব এসেট ভেরিফাই করে প্রজেক্ট ফোল্ডারে কপি করা
    - name: Move All Media Assets to App Folder
      run: |
        if [ -f "background.mp4" ] && [ -f "game_background.mp4" ] && [ -f "click.mp3" ]; then
          cp background.mp4 GameApp/
          cp game_background.mp4 GameApp/
          cp click.mp3 GameApp/
          echo "সবগুলো মিডিয়া এবং অডিও এসেট সফলভাবে লোড হয়েছে।"
        else
          echo "ERROR: background.mp4, game_background.mp4 অথবা click.mp3 ফাইল মিসিং আছে!"
          exit 1
        fi

    # ৫. XcodeGen এর জন্য কনফিগারেশন (project.yml) তৈরি করা
    - name: Create XcodeGen Specification
      run: |
        cat << 'EOF' > project.yml
        name: GameApp
        options:
          bundleIdPrefix: com.automation
        targets:
          GameApp:
            type: application
            platform: iOS
            deploymentTarget: "15.0"
            sources: [GameApp]
            info:
              path: GameApp/Info.plist
        EOF

    # ৬. রানারের ভেতরে স্বয়ংক্রিয়ভাবে .xcodeproj ফাইল জেনারেট করা
    - name: Generate Xcode Project File
      run: xcodegen generate

    # ७. অ্যাপল সার্টিফিকেট ছাড়া ল্যান্ডস্কেপ অ্যাপটি কম্পাইল করা (Unsigned Build)
    - name: Compile iOS App (No-Sign)
      run: |
        xcodebuild clean build \
          -project "GameApp.xcodeproj" \
          -scheme "GameApp" \
          -sdk iphoneos \
          -configuration Release \
          -derivedDataPath build_output \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_PROFILE_SPECIFIER="" \
          COMPILER_INDEX_STORE_ENABLE=NO

    # ৮. বিল্ড হওয়া ফাইলকে অফিসিয়াল Unsigned .ipa ফরম্যাটে প্যাকেজ করা
    - name: Package App into Unsigned IPA
      run: |
        mkdir -p Payload
        cp -r build_output/Build/Products/Release-iphoneos/GameApp.app Payload/
        zip -r GameApp.ipa Payload

    # ৯. তৈরি হওয়া ফাইনাল ল্যান্ডস্কেপ .ipa ফাইলটি গিটহাবে আপলোড করা
    - name: Upload Final IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GameZone-MetalCanvas-Edition
        path: GameApp.ipa
