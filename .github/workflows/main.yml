name: Ultimate Auto iOS Landscape Builder

on:
 # push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  generate-and-build:
    runs-on: macos-latest

    steps:
    # ১. গিটহাব থেকে আপনার আপলোড করা ভিডিও এবং সাউন্ড ফাইল রানারে নিয়ে আসা
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ২. এক্সকোড প্রজেক্ট তৈরি করার জন্য XcodeGen টুল ইনস্টল করা
    - name: Install XcodeGen
      run: brew install xcodegen

    # ৩. ক্লাউডে ফোল্ডার তৈরি করে স্লো-গ্লো এবং সাউন্ড সাপোর্টেড কোড রাইট করা
    - name: Create App Source Files
      run: |
        mkdir -p GameApp
        
        # (ক) অ্যাপের মেইন এন্ট্রি পয়েন্ট ফাইল তৈরি
        cat << 'EOF' > GameApp/GameAppApp.swift
        import SwiftUI

        @main
        struct GameAppApp: App {
            var body: some Scene {
                WindowGroup {
                    ContentView()
                }
            }
        }
        EOF

        # (খ) সাউন্ড প্লে করার জন্য প্রফেশনাল সাউন্ড ম্যানেজার ক্লাস
        cat << 'EOF' > GameApp/SoundManager.swift
        import AVFoundation

        class SoundManager {
            static let instance = SoundManager()
            var audioPlayer: AVAudioPlayer?

            func playClickSound() {
                // গিটহাবে আপলোড করা click.mp3 ফাইলটি প্রজেক্ট বান্ডেল থেকে খুঁজে বের করা
                guard let path = Bundle.main.path(forResource: "click", ofType: "mp3") else {
                    print("সাউন্ড ফাইলটি খুঁজে পাওয়া যায়নি!")
                    return
                }
                
                let url = URL(fileURLWithPath: path)
                
                do {
                    audioPlayer = try AVAudioPlayer(contentsOf: url)
                    audioPlayer?.prepareToPlay()
                    audioPlayer?.play()
                } catch {
                    print("সাউন্ড প্লে করতে ত্রুটি হয়েছে: \(error.localizedDescription)")
                }
            }
        }
        EOF

        # (গ) ভিডিও প্লেয়ার ফাইল (স্টপ লজিকসহ)
        cat << 'EOF' > GameApp/LoopingVideoPlayer.swift
        import SwiftUI
        import AVFoundation

        struct LoopingVideoPlayer: UIViewRepresentable {
            @Binding var isGameZoneActive: Bool
            
            class Coordinator: NSObject {
                var player: AVPlayer?
            }
            
            func makeCoordinator() -> Coordinator {
                return Coordinator()
            }

            func makeUIView(context: Context) -> UIView {
                guard let path = Bundle.main.path(forResource: "background", ofType: "mp4") else {
                    print("ভিডিও ফাইলটি পাওয়া যায়নি!")
                    return UIView()
                }
                
                let url = URL(fileURLWithPath: path)
                let player = AVPlayer(url: url)
                context.coordinator.player = player
                
                let view = VideoPlayerUIView(player: player)
                
                NotificationCenter.default.addObserver(forName: .AVPlayerItemDidPlayToEndTime, object: player.currentItem, queue: .main) { _ in
                    if !isGameZoneActive {
                        player.seek(to: .zero)
                        player.play()
                    }
                }
                
                player.play()
                return view
            }
            
            func updateUIView(_ uiView: UIView, context: Context) {
                if isGameZoneActive {
                    context.coordinator.player?.pause()
                    context.coordinator.player = nil
                }
            }
        }

        class VideoPlayerUIView: UIView {
            private var playerLayer: AVPlayerLayer?
            
            init(player: AVPlayer) {
                super.init(frame: .zero)
                let playerLayer = AVPlayerLayer(player: player)
                playerLayer.videoGravity = .resizeAspectFill
                self.layer.addSublayer(playerLayer)
                self.playerLayer = playerLayer
            }
            
            required init?(coder: NSCoder) { fatalError() }
            
            override func layoutSubviews() {
                super.layoutSubviews()
                playerLayer?.frame = self.bounds
            }
        }
        EOF

        # (ঘ) ইউজার ইন্টারফেস (স্লো গ্লো এবং সাউন্ড ট্রিগারসহ ContentView)
        cat << 'EOF' > GameApp/ContentView.swift
        import SwiftUI

        struct ContentView: View {
            @State private var isGameZoneActive = false
            @State private var isGlowing = false
            
            var body: some View {
                ZStack {
                    if !isGameZoneActive {
                        ZStack {
                            LoopingVideoPlayer(isGameZoneActive: $isGameZoneActive)
                                .ignoresSafeArea()
                            
                            VStack {
                                Spacer()
                                
                                Text("TAP TO SCREEN")
                                    .font(.system(size: 16, weight: .bold, design: .monospaced))
                                    .foregroundColor(.white)
                                    .tracking(4)
                                    .opacity(isGlowing ? 1.0 : 0.15) // গ্লো ইফেক্ট আরও গভীর করা হয়েছে
                                    .shadow(color: .white.opacity(0.8), radius: isGlowing ? 12 : 1)
                                    .onAppear {
                                        // অ্যানিমেশন ডিউরেশন ০.৮ থেকে বাড়িয়ে ১.৮ সেকেন্ড করা হয়েছে (অনেক স্লো ও স্মুথ হবে)
                                        withAnimation(.easeInOut(duration: 1.8).repeatForever(autoreverses: true)) {
                                            isGlowing = true
                                        }
                                    }
                                    .onTapGesture {
                                        // ১. টাচ করার সাথে সাথে কাস্টম mp3 সাউন্ড প্লে হবে
                                        SoundManager.instance.playClickSound()
                                        
                                        // ২. সামান্য ট্রানজিশন অ্যানিমেশন দিয়ে ২য় স্ক্রিনে যাবে
                                        withAnimation(.easeInOut(duration: 0.3)) {
                                            isGameZoneActive = true
                                        }
                                    }
                            }
                            .padding(.bottom, 35)
                        }
                    } else {
                        GameZoneView()
                    }
                }
            }
        }

        struct GameZoneView: View {
            var body: some View {
                Color.black
                    .ignoresSafeArea()
                    .overlay(
                        VStack(spacing: 25) {
                            Text("Welcome to Your Game Zone")
                                .font(.system(size: 32, weight: .black, design: .monospaced))
                                .foregroundColor(.green)
                                .multilineTextAlignment(.center)
                            
                            Text("[ আপনার অন্যান্য ফাংশনাল কাজ এবং কোড এখানে যুক্ত হবে ]")
                                .font(.system(size: 16, weight: .medium, design: .default))
                                .foregroundColor(.gray)
                                .padding()
                                .background(Color.white.opacity(0.05))
                                .cornerRadius(8)
                        }
                    )
            }
        }
        EOF

        # (ঙ) ল্যান্ডস্কেপ লকড Info.plist তৈরি
        cat << 'EOF' > GameApp/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleIdentifier</key>
            <string>com.automation.GameApp</string>
            <key>CFBundleExecutable</key>
            <string>GameApp</string>
            <key>CFBundleName</key>
            <string>GameApp</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>UILaunchScreen</key>
            <dict/>
            <key>UISupportedInterfaceOrientations</key>
            <array>
                <string>UIInterfaceOrientationLandscapeLeft</string>
                <string>UIInterfaceOrientationLandscapeRight</string>
            </array>
            <key>UISupportedInterfaceOrientations~ipad</key>
            <array>
                <string>UIInterfaceOrientationLandscapeLeft</string>
                <string>UIInterfaceOrientationLandscapeRight</string>
            </array>
        </dict>
        </plist>
        EOF

    # ৪. আপনার আপলোড করা ভিডিও এবং সাউন্ড ফাইল অ্যাপ ফোল্ডারে কপি করা
    - name: Move Assets to App Folder
      run: |
        if [ -f "background.mp4" ] && [ -f "click.mp3" ]; then
          cp background.mp4 GameApp/
          cp click.mp3 GameApp/
          echo "ভিডিও এবং সাউন্ড ফাইল সফলভাবে অ্যাপে যুক্ত করা হয়েছে।"
        else
          echo "ERROR: background.mp4 অথবা click.mp3 ফাইলটি মেইন ফোল্ডারে পাওয়া যায়নি!"
          exit 1
        fi

    # ৫. XcodeGen এর জন্য কনফিগারেশন (project.yml) তৈরি করা
    - name: Create XcodeGen Specification
      run: |
        cat << 'EOF' > project.yml
        name: GameApp
        options:
          bundleIdPrefix: com.automation
        targets:
          GameApp:
            type: application
            platform: iOS
            deploymentTarget: "15.0"
            sources: [GameApp]
            info:
              path: GameApp/Info.plist
        EOF

    # ৬. রানারের ভেতরে স্বয়ংক্রিয়ভাবে .xcodeproj ফাইল জেনারেট করা
    - name: Generate Xcode Project File
      run: xcodegen generate

    # ৭. অ্যাপল সার্টিফিকেট ছাড়া ল্যান্ডস্কেপ অ্যাপটি কম্পাইল করা (Unsigned Build)
    - name: Compile iOS App (No-Sign)
      run: |
        xcodebuild clean build \
          -project "GameApp.xcodeproj" \
          -scheme "GameApp" \
          -sdk iphoneos \
          -configuration Release \
          -derivedDataPath build_output \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_PROFILE_SPECIFIER="" \
          COMPILER_INDEX_STORE_ENABLE=NO

    # ৮. বিল্ড হওয়া ফাইলকে অফিসিয়াল Unsigned .ipa ফরম্যাটে প্যাকেজ করা
    - name: Package App into Unsigned IPA
      run: |
        mkdir -p Payload
        cp -r build_output/Build/Products/Release-iphoneos/GameApp.app Payload/
        zip -r GameApp.ipa Payload

    # ৯. তৈরি হওয়া ফাইনাল ল্যান্ডস্কেপ .ipa ফাইলটি গিটহাবে আপলোড করা
    - name: Upload Final IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GameZone-Landscape-App
        path: GameApp.ipa
